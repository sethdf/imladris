[global]
# pgBackRest config for Imladris Postgres
# Backup target: S3 bucket (imladris-state-{account_id})
# WAL archiving: continuous push to S3, async for performance
repo1-type=s3
repo1-s3-bucket=${PGBACKREST_S3_BUCKET:-imladris-state-767448074758}
repo1-s3-region=${AWS_REGION:-us-east-1}
repo1-s3-key-type=auto
repo1-s3-endpoint=s3.amazonaws.com
repo1-path=/pgbackrest
repo1-retention-full=4
repo1-retention-diff=14
repo1-cipher-type=none
log-level-console=info
log-level-file=detail
compress-type=zst
compress-level=6
process-max=2
start-fast=y

[imladris]
pg1-path=/var/lib/postgresql/data
