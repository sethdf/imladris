---
# =============================================================================
# site-aurora.yml — Local workstation (Aurora) setup
# =============================================================================
# Deploys PAI voice server, voice client, and STT tools on the local Linux
# machine. NOT for EC2 — this runs on Aurora (the physical workstation).
#
# Usage:
#   ansible-playbook -i "localhost," -c local ansible/site-aurora.yml
#
# Prerequisites:
#   - bun installed (~/.bun/bin/bun)
#   - PipeWire running (pw-play, pw-record available)
#   - SSH access to imladris (for BWS credential sync)
#
# Tags:
#   voice            — all voice components
#   voice-server     — voice server only
#   voice-client     — voice client only
#   voice-listener   — wake word listener daemon

- name: Configure Aurora workstation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    # --- Common ---
    bun_bin: "{{ ansible_env.HOME }}/.bun/bin/bun"
    aurora_scripts_dir: "{{ ansible_env.HOME }}/repos/imladris/scripts"

    # --- Voice Server Aurora ---
    voice_server_aurora_user: "{{ ansible_user_id }}"
    voice_server_aurora_home: "{{ ansible_env.HOME }}"
    voice_server_aurora_uid: "{{ ansible_user_uid }}"
    voice_server_aurora_port: "8888"
    voice_server_aurora_audio_dir: /tmp/voice-audio
    voice_server_aurora_env_dir: "{{ ansible_env.HOME }}/.config/PAI"
    voice_server_aurora_env_file: "{{ ansible_env.HOME }}/.config/PAI/.env"
    voice_server_aurora_scripts_dir: "{{ aurora_scripts_dir }}"
    voice_server_aurora_bun_bin: "{{ bun_bin }}"
    voice_server_aurora_bws_host: imladris
    voice_server_aurora_bws_user: ec2-user
    voice_server_aurora_sync_credentials: true

    # --- Voice Client ---
    voice_client_user: "{{ ansible_user_id }}"
    voice_client_home: "{{ ansible_env.HOME }}"
    voice_client_uid: "{{ ansible_user_uid }}"
    voice_client_scripts_dir: "{{ aurora_scripts_dir }}"
    voice_client_script: "{{ aurora_scripts_dir }}/voice-client.ts"
    voice_client_audio_dir: /tmp/voice-client-audio
    voice_client_server_url: "http://localhost:8888"
    voice_client_poll_interval: "5000"

    # --- Voice Listener ---
    voice_listener_user: "{{ ansible_user_id }}"
    voice_listener_home: "{{ ansible_env.HOME }}"
    voice_listener_uid: "{{ ansible_user_uid }}"
    voice_listener_scripts_dir: "{{ aurora_scripts_dir }}"
    voice_listener_server_url: "http://localhost:8888"
    voice_listener_wake_word: hey_jarvis
    voice_listener_wayland_display: wayland-0
    voice_listener_tmux_ssh_host: ec2-user@imladris
    voice_listener_tmux_session: work

  roles:
    - role: voice-server-aurora
      tags: [voice, voice-server]
    - role: voice-client
      tags: [voice, voice-client]
    - role: voice-listener
      tags: [voice, voice-listener]
