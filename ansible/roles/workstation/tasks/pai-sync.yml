---
# =============================================================================
# PAI Sync Daemon (v2.5.0) — filesystem-to-Postgres sync for /pai/memory
# Watches /pai/memory host bind mount via inotify (host side, not container).
# Pushes to core schema in pai_memory Postgres DB.
# Runs as system service (not user service) to survive session restarts.
# =============================================================================

- name: PAI Sync setup (boot-time only)
  when: not (ami_bake_phase | default(false))
  block:

    # ------------------------------------------------------------------
    # 0. Create /pai/memory host directory (EBS-backed, persistent)
    #    This replaces the pai-memory Docker named volume (which was on
    #    NVMe instance store — ephemeral across instance stop/start).
    #    The daemon watches this path; containers bind-mount it.
    # ------------------------------------------------------------------

    - name: Create /pai/memory host directory (EBS-backed)
      ansible.builtin.file:
        path: "{{ pai_sync_watch_root }}"
        state: directory
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0755"
      become: true

    - name: Migrate pai-memory Docker volume to /pai/memory if volume exists and dir is empty
      ansible.builtin.shell: |
        # Check if migration is needed
        volume_exists=$(docker volume inspect pai-memory &>/dev/null && echo yes || echo no)
        dir_empty=$([ -z "$(ls -A {{ pai_sync_watch_root }} 2>/dev/null)" ] && echo yes || echo no)

        if [[ "$volume_exists" == "yes" && "$dir_empty" == "yes" ]]; then
          echo "Migrating pai-memory volume → {{ pai_sync_watch_root }}"
          docker run --rm \
            --mount "type=volume,src=pai-memory,dst=/src,readonly" \
            --mount "type=bind,src={{ pai_sync_watch_root }},dst=/dst" \
            alpine:latest \
            sh -c "cp -r /src/. /dst/ && chown -R {{ imladris_user }}:{{ imladris_user }} /dst/ 2>/dev/null || true"
          echo "Migration complete"
        elif [[ "$dir_empty" == "no" ]]; then
          echo "{{ pai_sync_watch_root }} already has content — skipping migration"
        else
          echo "No pai-memory volume to migrate — starting fresh"
        fi
      become: false
      changed_when: false

    - name: Populate /pai/memory from ~/.claude/MEMORY if still empty
      ansible.builtin.shell: |
        if [ -z "$(ls -A {{ pai_sync_watch_root }} 2>/dev/null)" ] && \
           [ -d "{{ claude_dir }}/MEMORY" ]; then
          cp -r "{{ claude_dir }}/MEMORY/." "{{ pai_sync_watch_root }}/"
          echo "Populated {{ pai_sync_watch_root }} from {{ claude_dir }}/MEMORY/"
        else
          echo "{{ pai_sync_watch_root }} already populated or no source — skipping"
        fi
      become: false
      changed_when: false

    # ------------------------------------------------------------------
    # 1. Install node dependencies and build compiled binaries
    # ------------------------------------------------------------------

    - name: Install pai-sync Bun dependencies
      ansible.builtin.command:
        cmd: "{{ bun_bin }} install --frozen-lockfile"
        chdir: "{{ pai_sync_source_dir }}"
      become: false
      changed_when: false

    - name: Build pai-sync-daemon binary
      ansible.builtin.command:
        cmd: >
          {{ bun_bin }} build daemon.ts
          --outfile /usr/local/bin/pai-sync-daemon
          --compile
          --target bun-linux-arm64
        chdir: "{{ pai_sync_source_dir }}"
      become: true
      changed_when: true

    - name: Build pai-sync CLI binary
      ansible.builtin.command:
        cmd: >
          {{ bun_bin }} build cli.ts
          --outfile /usr/local/bin/pai-sync
          --compile
          --target bun-linux-arm64
        chdir: "{{ pai_sync_source_dir }}"
      become: true
      changed_when: true

    - name: Set executable permissions on binaries
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "0755"
        owner: root
        group: root
      loop:
        - /usr/local/bin/pai-sync-daemon
        - /usr/local/bin/pai-sync
      become: true

    # ------------------------------------------------------------------
    # 2. Create pai_memory database and apply core schema
    # ------------------------------------------------------------------

    - name: Create pai_memory database
      ansible.builtin.shell: |
        docker exec imladris-windmill_db-1 psql -U postgres -tc \
          "SELECT 1 FROM pg_database WHERE datname='pai_memory'" \
          | grep -q 1 || \
        docker exec imladris-windmill_db-1 psql -U postgres \
          -c "CREATE DATABASE pai_memory"
      become: false
      changed_when: false
      failed_when: false

    - name: Apply core schema DDL (idempotent)
      ansible.builtin.shell: |
        docker exec -i imladris-windmill_db-1 \
          psql -U postgres -d pai_memory \
          < "{{ imladris_repo_dir }}/sql/schemas/core.sql"
      become: false
      changed_when: false

    # ------------------------------------------------------------------
    # 3. Kernel tuning — inotify watch limit
    # ------------------------------------------------------------------

    - name: Set inotify max_user_watches
      ansible.posix.sysctl:
        name: fs.inotify.max_user_watches
        value: '524288'
        sysctl_set: true
        state: present
        reload: true
      become: true

    # ------------------------------------------------------------------
    # 4. Secrets — write /etc/pai-sync/env from PAI_SYNC_POSTGRES_URL
    #    Set pai_sync_postgres_url via --extra-vars or BWS fetch.
    # ------------------------------------------------------------------

    - name: Create /etc/pai-sync directory
      ansible.builtin.file:
        path: /etc/pai-sync
        state: directory
        owner: root
        group: "{{ imladris_user }}"
        mode: "0750"
      become: true

    - name: Write /etc/pai-sync/env
      ansible.builtin.copy:
        dest: "{{ pai_sync_env_file }}"
        owner: root
        group: "{{ imladris_user }}"
        mode: "0640"
        content: |
          POSTGRES_URL={{ pai_sync_postgres_url }}
          PAI_SYNC_WATCH_ROOT={{ pai_sync_watch_root }}
          PAI_SYNC_MACHINE_ID={{ pai_sync_machine_id }}
          PAI_SYNC_EXTRA_WATCH={{ claude_dir }}/projects
          PAI_EMBED_BATCH_SIZE=20
          PAI_EMBED_INTERVAL_MS=60000
      become: true
      when: pai_sync_postgres_url | length > 0
      no_log: true  # suppress URL (contains password) from Ansible output

    # ------------------------------------------------------------------
    # 5. systemd system service (root-owned, survives user session lifecycle)
    # ------------------------------------------------------------------

    - name: Install pai-sync systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/pai-sync.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=PAI Memory Sync Daemon
          After=docker.service network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/pai-sync-daemon
          Restart=always
          RestartSec=5
          WatchdogSec=60
          # POSTGRES_URL set by Ansible from BWS — never hardcoded
          EnvironmentFile={{ pai_sync_env_file }}

          [Install]
          WantedBy=multi-user.target
      become: true

    - name: Enable pai-sync service
      ansible.builtin.systemd:
        name: pai-sync
        enabled: true
        daemon_reload: true
      become: true

    - name: Start pai-sync service
      ansible.builtin.systemd:
        name: pai-sync
        state: started
      become: true
      when: pai_sync_postgres_url | length > 0
      failed_when: false
