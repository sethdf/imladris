---
# =============================================================================
# Tailscale VPN (Bootstrap Step 2 — Tailscale, Step 8 — auth)
# =============================================================================
# Decision 33: Tailscale-only network access

- name: Check if Tailscale is installed
  ansible.builtin.command: which tailscale
  register: tailscale_check
  changed_when: false
  failed_when: false

- name: Install Tailscale
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -fsSL https://tailscale.com/install.sh | bash
    executable: /bin/bash
  become: true
  changed_when: true
  when: tailscale_check.rc != 0

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  become: true

- name: Check Tailscale status
  ansible.builtin.command: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Clean up tailnet ghost devices before enrollment
  # Prevents the `imladris → imladris-N` suffix bump when a prior EC2 instance's
  # tailnet device still holds the canonical hostname. Fails open if prereqs
  # missing — never blocks provisioning.
  ansible.builtin.command: >
    bash {{ playbook_dir }}/../scripts/tailscale-cleanup-ghosts.sh
    --name={{ tailscale_hostname }}
  environment:
    BWS_ACCESS_TOKEN: "{{ bws_access_token | default(lookup('env', 'BWS_ACCESS_TOKEN'), true) }}"
  register: ghost_cleanup
  changed_when: "'deleted=' in ghost_cleanup.stdout and 'deleted=0' not in ghost_cleanup.stdout"
  failed_when: false
  when:
    - tailscale_auth_key | length > 0
    - tailscale_status.rc != 0

- name: Authenticate Tailscale
  ansible.builtin.command: >
    tailscale up
    --authkey {{ tailscale_auth_key }}
    --hostname {{ tailscale_hostname }}
    --ssh
  become: true
  changed_when: true
  when:
    - tailscale_auth_key | length > 0
    - tailscale_status.rc != 0
