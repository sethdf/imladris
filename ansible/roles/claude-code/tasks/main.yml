---
# =============================================================================
# Claude Code (Bootstrap Steps 4, 5, 6, 10)
# =============================================================================
# Additive content (D34), runtime dirs, settings template, CLI install, context seeding
# PAI owns: ~/.claude/skills/, ~/.claude/agents/, ~/.claude/hooks/, ~/.claude/PAI/
# Imladris adds: custom skills/agents (rsync --ignore-existing), custom hooks (symlinks)

# --- Step 10: Install Claude Code CLI (bake-safe: no repo dependency) ---

- name: Check if Claude Code CLI is installed
  ansible.builtin.command: claude --version
  register: claude_code_cli_check
  changed_when: false
  failed_when: false

- name: Install Claude Code CLI via native installer
  ansible.builtin.shell: curl -fsSL https://claude.ai/install.sh | bash
  become: false
  changed_when: true
  when: claude_code_cli_check.rc != 0

# --- Boot-time only: everything below requires repos to be cloned ---

- name: Boot-time Claude Code configuration
  when: not (ami_bake_phase | default(false))
  block:

    # --- Step 4: Create directories + additive content (Decision 34) ---
    # PAI owns ~/.claude/skills/ and ~/.claude/agents/ directories.
    # Imladris ONLY adds content additively — never replaces PAI files.

    - name: Create Claude directory
      ansible.builtin.file:
        path: "{{ claude_dir }}"
        state: directory
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0755"

    - name: Create Claude symlinks
      ansible.builtin.file:
        src: "{{ item.item.src }}"
        dest: "{{ item.item.dest }}"
        state: link
        force: true
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
      loop: "{{ claude_symlinks }}"
      when: claude_symlinks | length > 0

    # --- Step 4b: Additive imladris skills/agents (never overwrite PAI) ---
    # rsync --ignore-existing copies new files without touching PAI-owned ones.

    - name: Ensure skills directory exists
      ansible.builtin.file:
        path: "{{ claude_dir }}/skills"
        state: directory
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0755"

    - name: Check imladris custom skills exist
      ansible.builtin.stat:
        path: "{{ imladris_custom_skills_dir }}"
      register: imladris_skills_stat

    - name: Add imladris custom skills (additive, never overwrite PAI)
      ansible.builtin.shell: >
        rsync -a --ignore-existing
        --exclude='handlers'
        --exclude='lib'
        --exclude='.git'
        "{{ imladris_custom_skills_dir }}/"
        "{{ claude_dir }}/skills/"
      become: false
      changed_when: false
      when: imladris_skills_stat.stat.exists | default(false)

    - name: Ensure agents directory exists
      ansible.builtin.file:
        path: "{{ claude_dir }}/agents"
        state: directory
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0755"

    - name: Check imladris custom agents exist
      ansible.builtin.stat:
        path: "{{ imladris_custom_agents_dir }}"
      register: imladris_agents_stat

    - name: Add imladris custom agents (additive, never overwrite PAI)
      ansible.builtin.shell: >
        rsync -a --ignore-existing
        "{{ imladris_custom_agents_dir }}/"
        "{{ claude_dir }}/agents/"
      become: false
      changed_when: false
      when: imladris_agents_stat.stat.exists | default(false)

    # --- Step 5: Create Runtime Directories ---

    - name: Create Claude runtime directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0755"
      loop: "{{ claude_runtime_dirs }}"

    # --- Pre-approve home directory as trusted workspace ---
    # Prevents interactive "trust this folder?" prompt on every Claude start

    - name: Pre-approve home directory for Claude workspace trust
      ansible.builtin.copy:
        content: "{{ imladris_home }}\n"
        dest: "{{ claude_dir }}/.approvedDirectories"
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0644"
        force: false

    # --- Context Seeding (skip if already exists) ---

    - name: Check if CLAUDE.md exists
      ansible.builtin.stat:
        path: "{{ claude_dir }}/CLAUDE.md"
      register: claude_code_md_stat

    - name: Check if CLAUDE.md seed exists
      ansible.builtin.stat:
        path: "{{ context_seed_dir }}/CLAUDE.md"
      register: claude_code_md_seed_stat

    - name: Seed CLAUDE.md
      ansible.builtin.copy:
        src: "{{ context_seed_dir }}/CLAUDE.md"
        dest: "{{ claude_dir }}/CLAUDE.md"
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0644"
        remote_src: true
      when:
        - not claude_code_md_stat.stat.exists
        - claude_code_md_seed_stat.stat.exists

    - name: Check for memory seed directory
      ansible.builtin.stat:
        path: "{{ memory_seed_dir }}"
      register: claude_code_memory_seed_stat

    - name: Find memory seed files
      ansible.builtin.find:
        paths: "{{ memory_seed_dir }}"
        patterns: "*.md"
      register: claude_code_memory_seed_files
      when: claude_code_memory_seed_stat.stat.exists | default(false)

    - name: Seed MEMORY files (skip existing)
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ claude_dir }}/MEMORY/{{ item.path | basename }}"
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0644"
        remote_src: true
        force: false
      loop: "{{ claude_code_memory_seed_files.files | default([]) }}"
      when: claude_code_memory_seed_stat.stat.exists | default(false)

    # --- Step 6: Settings Template ---

    - name: Check if settings.json exists
      ansible.builtin.stat:
        path: "{{ claude_dir }}/settings.json"
      register: claude_code_settings_stat

    - name: Find settings template
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ settings_template_candidates }}"
      register: claude_code_settings_template_check
      when: not claude_code_settings_stat.stat.exists

    - name: Copy settings template
      ansible.builtin.copy:
        src: "{{ item.item }}"
        dest: "{{ claude_dir }}/settings.json"
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0644"
        remote_src: true
      loop: "{{ claude_code_settings_template_check.results | default([]) }}"
      when:
        - not claude_code_settings_stat.stat.exists
        - item.stat is defined
        - item.stat.exists
      loop_control:
        label: "{{ item.item | default('unknown') }}"

    # --- Step 6b: Apply Imladris Hooks (additive to PAI) ---
    # PAI owns ~/.claude/hooks/ directory. This script symlinks imladris-specific
    # hooks into that directory and merges registrations into settings.json.
    # Safe to run after PAI updates — only adds, never removes PAI hooks.

    - name: Check if apply-imladris-hooks script exists
      ansible.builtin.stat:
        path: "{{ imladris_repo_dir }}/scripts/apply-imladris-hooks.sh"
      register: apply_hooks_script_stat

    - name: Apply imladris hooks on top of PAI
      ansible.builtin.shell: >
        bash {{ imladris_repo_dir }}/scripts/apply-imladris-hooks.sh
        --repo-dir {{ imladris_repo_dir }}
      become: false
      changed_when: true
      when: apply_hooks_script_stat.stat.exists | default(false)

    # --- pai CLI (Decision 22: Workstream Management, Layer 3) ---

    - name: Create local bin directory
      ansible.builtin.file:
        path: "{{ imladris_home }}/.local/bin"
        state: directory
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0755"

    - name: Check if pai script exists
      ansible.builtin.stat:
        path: "{{ imladris_repo_dir }}/scripts/pai"
      register: pai_script_stat

    - name: Symlink pai CLI to PATH
      ansible.builtin.file:
        src: "{{ imladris_repo_dir }}/scripts/pai"
        dest: "{{ imladris_home }}/.local/bin/pai"
        state: link
        force: true
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
      when: pai_script_stat.stat.exists | default(false)

    # --- Utility Scripts (symlink to PATH) ---

    - name: Check for sync-credentials script
      ansible.builtin.stat:
        path: "{{ imladris_repo_dir }}/scripts/sync-credentials.sh"
      register: sync_creds_script_stat

    - name: Symlink sync-credentials to PATH
      ansible.builtin.file:
        src: "{{ imladris_repo_dir }}/scripts/sync-credentials.sh"
        dest: "{{ imladris_home }}/.local/bin/sync-credentials"
        state: link
        force: true
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
      when: sync_creds_script_stat.stat.exists | default(false)

    # --- Skip permissions flag (Decision 23: Claude runs inside tmux, unattended) ---

    - name: Set Claude to skip permissions in bashrc
      ansible.builtin.blockinfile:
        path: "{{ imladris_home }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED - Claude Code Permissions"
        block: |
          export CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1
          export PATH="$HOME/.local/bin:$PATH"
        create: true
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0644"

    # --- Bitwarden Secrets Token (Decision 13/20: Bitwarden is source of truth) ---
    # Token passed via: -e bws_access_token=YOUR_TOKEN

    - name: Set BWS_ACCESS_TOKEN in bashrc
      ansible.builtin.blockinfile:
        path: "{{ imladris_home }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED - Bitwarden Secrets"
        block: |
          export BWS_ACCESS_TOKEN="{{ bws_access_token }}"
        create: true
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0644"
      when: bws_access_token | default('') | length > 0
      no_log: true

    # --- Auto-attach tmux on SSH login (Decision 23: SSH disconnect ≠ session lost) ---

    - name: Auto-start tmux on interactive login
      ansible.builtin.blockinfile:
        path: "{{ imladris_home }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED - tmux auto-attach"
        block: |
          if command -v tmux &>/dev/null && [ -n "$SSH_CONNECTION" ] && [ -z "$TMUX" ]; then
            tmux attach -t work 2>/dev/null || tmux new -s work
          fi
        create: true
        owner: "{{ imladris_user }}"
        group: "{{ imladris_user }}"
        mode: "0644"
