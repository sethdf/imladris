---
- name: restart voice-client
  ansible.builtin.systemd:
    name: voice-client
    scope: user
    state: restarted
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ voice_client_uid | default('1000') }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ voice_client_uid | default('1000') }}/bus"
  failed_when: false
