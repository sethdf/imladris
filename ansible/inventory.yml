---
all:
  children:
    imladris:
      hosts:
        # Local execution (from UserData / on-box)
        # Uncomment localhost and comment imladris to run on-box
        # localhost:
        #   ansible_connection: local
        #   ansible_python_interpreter: /usr/bin/python3

        # Self-targeting: run Ansible ON the instance against itself
        # Uses local connection so no SSH key needed
        imladris-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3

        # Remote execution (from Aurora over Tailscale SSH).
        # Host entry name differs from group name to avoid the "group and host
        # with same name" Ansible warning. `ansible_host` is the canonical
        # Tailscale MagicDNS name — guaranteed to resolve to the live
        # workstation because bootstrap's pre-enroll ghost cleanup
        # (scripts/tailscale-cleanup-ghosts.sh) keeps the `imladris` name free.
        imladris-remote:
          ansible_host: imladris
          ansible_user: ec2-user
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
