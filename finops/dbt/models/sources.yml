version: 2

sources:
  - name: salesforce
    schema: raw
    description: Salesforce CRM data synced via Airbyte
    tables:
      - name: accounts
      - name: opportunities
      - name: contacts
      - name: leads

  - name: hubspot
    schema: raw
    description: HubSpot CRM (Signal brand) synced via Airbyte
    tables:
      - name: companies
      - name: deals
      - name: contacts

  - name: gong
    schema: raw
    description: Gong conversation intelligence synced via Airbyte
    tables:
      - name: calls

  - name: stripe
    schema: raw
    description: Stripe billing data synced via Airbyte
    tables:
      - name: customers
      - name: subscriptions
      - name: invoices

  - name: chartmogul
    schema: raw_chartmogul
    description: ChartMogul subscription data via ChartMogul Destinations (push to Postgres)
    tables:
      - name: customers
      - name: activities
