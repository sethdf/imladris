AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Coralogix POC - OTel Collector for URL monitoring (httpcheck).
  Deploys to quality cluster in prod account.
  AWS infrastructure metrics handled separately via Coralogix AWS integration.

Parameters:
  ClusterName:
    Type: String
    Default: quality
    Description: ECS cluster to deploy the collector to

  CoralogixPrivateKey:
    Type: String
    NoEcho: true
    Description: Coralogix Send-Your-Data API key (private key)

  CoralogixRegion:
    Type: String
    Default: us1
    AllowedValues: [us1, us2, eu1, eu2, ap1, ap2, ap3]
    Description: Coralogix region slug

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for Fargate task
    Default: subnet-550f2422,subnet-b6dcab9d,subnet-9b9cdec2,subnet-d3b0a8e9

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for Fargate task
    Default: sg-0e2da776f2d0c86a6

Mappings:
  RegionEndpoints:
    us1: { Ingress: ingress.us1.coralogix.com }
    us2: { Ingress: ingress.us2.coralogix.com }
    eu1: { Ingress: ingress.eu1.coralogix.com }
    eu2: { Ingress: ingress.eu2.coralogix.com }
    ap1: { Ingress: ingress.ap1.coralogix.com }
    ap2: { Ingress: ingress.ap2.coralogix.com }
    ap3: { Ingress: ingress.ap3.coralogix.com }

Resources:
  # IAM Role for OTel Collector task
  OTelCollectorTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: coralogix-otel-collector-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # Execution role for pulling images and writing logs
  OTelCollectorExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: coralogix-otel-collector-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # CloudWatch Log Group
  OTelCollectorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/coralogix-otel-collector
      RetentionInDays: 14

  # Task Definition - OTel Collector (httpcheck URL monitoring only)
  OTelCollectorTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: coralogix-otel-collector
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      TaskRoleArn: !GetAtt OTelCollectorTaskRole.Arn
      ExecutionRoleArn: !GetAtt OTelCollectorExecutionRole.Arn
      ContainerDefinitions:
        - Name: otel-collector
          Image: otel/opentelemetry-collector-contrib:0.120.0
          Essential: true
          Command:
            - --config=env:OTEL_CONFIG
          Environment:
            - Name: OTEL_CONFIG
              Value: !Sub
                - |
                  receivers:
                    httpcheck:
                      targets:
                        - endpoint: https://platform.buxtonco.com
                          method: GET
                        - endpoint: https://www.buxtonco.com
                          method: GET
                        - endpoint: https://www.audiense.com
                          method: GET
                        - endpoint: https://www.getelevar.com
                          method: GET
                        - endpoint: https://app.getelevar.com
                          method: GET
                        - endpoint: https://mft.buxtonco.com
                          method: GET
                        - endpoint: https://id.buxtonco.com
                          method: GET
                        - endpoint: https://cdn01.buxtonco.com
                          method: GET
                      collection_interval: 60s
                  processors:
                    batch:
                      send_batch_size: 1000
                      timeout: 10s
                    resource/urlmon:
                      attributes:
                        - key: cx.application.name
                          value: imladris
                          action: upsert
                        - key: cx.subsystem.name
                          value: url-monitor
                          action: upsert
                  exporters:
                    otlp:
                      endpoint: ${IngressEndpoint}:443
                      headers:
                        Authorization: "Bearer ${CoralogixPrivateKey}"
                  service:
                    telemetry:
                      logs:
                        level: info
                    pipelines:
                      metrics/urlmon:
                        receivers: [httpcheck]
                        processors: [resource/urlmon, batch]
                        exporters: [otlp]
                - IngressEndpoint: !FindInMap [RegionEndpoints, !Ref CoralogixRegion, Ingress]
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OTelCollectorLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: otel-collector

  # ECS Service
  OTelCollectorService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: coralogix-otel-collector
      Cluster: !Ref ClusterName
      TaskDefinition: !Ref OTelCollectorTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref SecurityGroupId
          AssignPublicIp: DISABLED

Outputs:
  TaskDefinitionArn:
    Description: ARN of the OTel Collector task definition
    Value: !Ref OTelCollectorTaskDefinition
  ServiceName:
    Description: Name of the OTel Collector ECS service
    Value: !GetAtt OTelCollectorService.Name
  TaskRoleArn:
    Description: ARN of the OTel Collector task role
    Value: !GetAtt OTelCollectorTaskRole.Arn
  IngressEndpoint:
    Description: Coralogix OTLP ingress endpoint for this region
    Value: !Sub
      - "${IngressEndpoint}:443"
      - IngressEndpoint: !FindInMap [RegionEndpoints, !Ref CoralogixRegion, Ingress]
