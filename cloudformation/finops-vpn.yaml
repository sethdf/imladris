AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FinOps - Site-to-site VPN connection to Harmony SASE (buxnet01 Dallas gateway).
  Matches existing prod VPN pattern: IKEv2, static routes, PSK auth.
  Customer Gateway = buxnet01 Dallas (131.226.43.89).
  After deploy: note the VGW tunnel outside IPs, configure matching tunnel
  in Harmony SASE portal on the Dallas gateway.

Parameters:
  ProjectTag:
    Type: String
    Default: Finops

  VpcStackName:
    Type: String

  HarmonyGatewayIP:
    Type: String
    Default: '131.226.43.89'
    Description: buxnet01 Dallas gateway public IP

  HarmonySubnet:
    Type: String
    Default: '10.255.0.0/16'
    Description: Harmony SASE client subnet (buxnet01)

  PublicRouteTableId:
    Type: String
    Description: Public subnet route table ID from the VPC

  PrivateRouteTableId:
    Type: String
    Description: Private subnet route table ID from the VPC

Resources:
  CustomerGateway:
    Type: AWS::EC2::CustomerGateway
    Properties:
      Type: ipsec.1
      BgpAsn: '65000'
      IpAddress: !Ref HarmonyGatewayIP
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-harmony-cgw' }
        - { Key: Project, Value: !Ref ProjectTag }

  VpnGateway:
    Type: AWS::EC2::VPNGateway
    Properties:
      Type: ipsec.1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-vgw' }
        - { Key: Project, Value: !Ref ProjectTag }

  VpnGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !ImportValue { Fn::Sub: '${VpcStackName}-VpcId' }
      VpnGatewayId: !Ref VpnGateway

  VpnConnection:
    Type: AWS::EC2::VPNConnection
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !Ref CustomerGateway
      VpnGatewayId: !Ref VpnGateway
      StaticRoutesOnly: true
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-harmony-vpn' }
        - { Key: Project, Value: !Ref ProjectTag }

  # Static route: tell the VPN connection about the Harmony client subnet
  VpnStaticRoute:
    Type: AWS::EC2::VPNConnectionRoute
    Properties:
      VpnConnectionId: !Ref VpnConnection
      DestinationCidrBlock: !Ref HarmonySubnet

  # Route in public subnet route table: Harmony clients -> VGW
  PublicRouteToHarmony:
    Type: AWS::EC2::Route
    DependsOn: VpnGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTableId
      DestinationCidrBlock: !Ref HarmonySubnet
      GatewayId: !Ref VpnGateway

  # Route in private subnet route table: Harmony clients -> VGW
  PrivateRouteToHarmony:
    Type: AWS::EC2::Route
    DependsOn: VpnGatewayAttachment
    Properties:
      RouteTableId: !Ref PrivateRouteTableId
      DestinationCidrBlock: !Ref HarmonySubnet
      GatewayId: !Ref VpnGateway

  # Allow Harmony SASE clients to reach ALB on 443
  AlbIngressFromHarmony:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue { Fn::Sub: 'finops-alb-entra-AlbSecurityGroupId' }
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref HarmonySubnet
      Description: 'HTTPS from Harmony SASE clients'

Outputs:
  VpnGatewayId:
    Value: !Ref VpnGateway

  VpnConnectionId:
    Value: !Ref VpnConnection

  CustomerGatewayId:
    Value: !Ref CustomerGateway

  TunnelConfig:
    Description: >
      After deploy, run: aws ec2 describe-vpn-connections --vpn-connection-ids <VpnConnectionId>
      to get the tunnel outside IPs and PSKs. Configure matching tunnel in
      Harmony SASE portal on buxnet01 Dallas gateway.
    Value: !Sub 'Run: aws --profile finance ec2 describe-vpn-connections --vpn-connection-ids ${VpnConnection} --region us-east-1'
