AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Cross-account IAM roles for Imladris v2 cloud workstation.
  Deployed via StackSet to all member accounts (Decision #17).
  Two roles: ImladrisReadOnly (default, read-only queries) and
  ImladrisAdmin (full administrative access for operational tasks).

Parameters:
  WorkstationAccountId:
    Type: String
    Description: AWS account ID where the Imladris EC2 workstation runs
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID

Resources:

  ImladrisReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ImladrisReadOnly
      Description: >-
        Default cross-account role for Imladris workstation.
        Used by Steampipe queries and all read operations.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${WorkstationAccountId}:role/imladris-instance-role'
                - !Sub 'arn:aws:iam::${WorkstationAccountId}:role/ImladrisWorkstationRole'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'

  ImladrisAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ImladrisAdmin
      Description: >-
        Administrative cross-account role for Imladris workstation.
        Full access for operational tasks (cost optimization, resource cleanup, deployments).
        Requires explicit AssumeRole, all usage logged in CloudTrail.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${WorkstationAccountId}:role/imladris-instance-role'
                - !Sub 'arn:aws:iam::${WorkstationAccountId}:role/ImladrisWorkstationRole'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

Outputs:
  ReadOnlyRoleArn:
    Description: ARN of the ImladrisReadOnly role for cross-account read access
    Value: !GetAtt ImladrisReadOnlyRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ReadOnlyRoleArn'
  AdminRoleArn:
    Description: ARN of the ImladrisAdmin role for cross-account administrative access
    Value: !GetAtt ImladrisAdminRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AdminRoleArn'
