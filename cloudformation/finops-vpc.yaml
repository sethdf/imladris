AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FinOps - Network foundation. Creates a dedicated VPC with public
  subnets (for ALB + Fargate task egress via IGW) and private subnets (RDS
  only, no internet). No NAT Gateway by design - Fargate tasks sit in public
  subnets with auto-assigned public IPs, and security groups (deployed in
  sibling stacks) enforce ALB-only inbound. This saves ~$32/mo vs the NAT
  pattern while keeping the DB fully private.

Parameters:
  ProjectTag:
    Type: String
    Default: Finops
    Description: Applied to all resources as Project= tag for cost allocation.

  VpcCidr:
    Type: String
    Default: 10.20.0.0/16
    Description: Primary CIDR block for the new VPC.
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$

  PublicSubnet1Cidr:
    Type: String
    Default: 10.20.0.0/24
    Description: Public subnet in AZ1 (ALB + compute with SaaS egress).

  PublicSubnet2Cidr:
    Type: String
    Default: 10.20.1.0/24
    Description: Public subnet in AZ2.

  PrivateSubnet1Cidr:
    Type: String
    Default: 10.20.10.0/24
    Description: Private subnet in AZ1 (RDS only; no IGW route).

  PrivateSubnet2Cidr:
    Type: String
    Default: 10.20.11.0/24
    Description: Private subnet in AZ2.

  EnableFlowLogs:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Write VPC Flow Logs to CloudWatch (small cost, big security win).

Conditions:
  CreateFlowLogs: !Equals [!Ref EnableFlowLogs, 'true']

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-vpc' }
        - { Key: Project, Value: !Ref ProjectTag }

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-igw' }
        - { Key: Project, Value: !Ref ProjectTag }

  IgwAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # --- Public subnets (ALB + Fargate) ---
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-public-1' }
        - { Key: Tier, Value: public }
        - { Key: Project, Value: !Ref ProjectTag }

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-public-2' }
        - { Key: Tier, Value: public }
        - { Key: Project, Value: !Ref ProjectTag }

  # --- Private subnets (RDS only) ---
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-private-1' }
        - { Key: Tier, Value: private }
        - { Key: Project, Value: !Ref ProjectTag }

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-private-2' }
        - { Key: Tier, Value: private }
        - { Key: Project, Value: !Ref ProjectTag }

  # --- Public route table (0.0.0.0/0 → IGW) ---
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-public-rt' }
        - { Key: Project, Value: !Ref ProjectTag }

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  # --- Private route table (no internet; kept for future expansion) ---
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-private-rt' }
        - { Key: Project, Value: !Ref ProjectTag }

  PrivateSubnet1Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnet2Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet2

  # --- S3 gateway endpoint (free, lets private resources read S3 without NAT) ---
  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PublicRouteTable
        - !Ref PrivateRouteTable

  # --- Flow Logs (optional, on by default) ---
  FlowLogsRole:
    Type: AWS::IAM::Role
    Condition: CreateFlowLogs
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: vpc-flow-logs.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogsToCW
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !GetAtt FlowLogsGroup.Arn

  FlowLogsGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateFlowLogs
    Properties:
      LogGroupName: !Sub /aws/vpc/${ProjectTag}/flow-logs
      RetentionInDays: 30

  FlowLog:
    Type: AWS::EC2::FlowLog
    Condition: CreateFlowLogs
    Properties:
      ResourceId: !Ref Vpc
      ResourceType: VPC
      TrafficType: REJECT
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref FlowLogsGroup
      DeliverLogsPermissionArn: !GetAtt FlowLogsRole.Arn

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export: { Name: !Sub '${AWS::StackName}-VpcId' }

  VpcCidr:
    Value: !Ref VpcCidr
    Export: { Name: !Sub '${AWS::StackName}-VpcCidr' }

  PublicSubnetIds:
    Value: !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]
    Export: { Name: !Sub '${AWS::StackName}-PublicSubnetIds' }

  PrivateSubnetIds:
    Value: !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
    Export: { Name: !Sub '${AWS::StackName}-PrivateSubnetIds' }

  PublicSubnet1Id:
    Value: !Ref PublicSubnet1
    Export: { Name: !Sub '${AWS::StackName}-PublicSubnet1Id' }

  PublicSubnet2Id:
    Value: !Ref PublicSubnet2
    Export: { Name: !Sub '${AWS::StackName}-PublicSubnet2Id' }

  PrivateSubnet1Id:
    Value: !Ref PrivateSubnet1
    Export: { Name: !Sub '${AWS::StackName}-PrivateSubnet1Id' }

  PrivateSubnet2Id:
    Value: !Ref PrivateSubnet2
    Export: { Name: !Sub '${AWS::StackName}-PrivateSubnet2Id' }
