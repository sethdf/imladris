AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FinOps - Airbyte OSS on a single EC2 (t4g.small, Graviton). Airbyte
  OSS is a multi-container application (server, webapp, worker, temporal) that
  Airbyte officially supports via docker-compose. Running it on one small
  instance is simpler, cheaper ($12/mo), and matches upstream docs - vs a
  multi-service Fargate split that would add coordination complexity. Data
  persists on an attached EBS volume; replaceable by terminating + launching
  (metadata lives in RDS once we flip MB_DB_* envs). UI is gated by the shared
  ALB at https://airbyte.{DomainName}.

Parameters:
  ProjectTag:
    Type: String
    Default: Finops

  VpcStackName:
    Type: String

  RdsStackName:
    Type: String

  AlbStackName:
    Type: String

  InstanceType:
    Type: String
    Default: t4g.large
    AllowedValues: [t4g.large, t4g.xlarge, t4g.2xlarge, m7g.large, m7g.xlarge]
    Description: >
      Airbyte OSS minimum (per official docs, verified via Context7):
      4 vCPU + 8 GB RAM (or 2 vCPU + 8 GB with --low-resource-mode).
      t4g.large = 2 vCPU / 8 GB — minimum viable with --low-resource-mode.
      t4g.xlarge = 4 vCPU / 16 GB — recommended for any real ingestion volume.
      Smaller sizes (t4g.medium / t4g.small) are insufficient and Airbyte
      will fail to start.

  AirbyteLowResourceMode:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      Use --low-resource-mode flag with abctl. Required for 2 vCPU instances
      (t4g.large). Set to false for 4+ vCPU (t4g.xlarge or larger).

  AbctlVersion:
    Type: String
    Default: 'v0.30.0'
    Description: Airbyte abctl release tag (https://github.com/airbytehq/abctl/releases).

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: Amazon Linux 2023 ARM64 (SSM public parameter).

  DataVolumeSizeGb:
    Type: Number
    Default: 30
    MinValue: 20
    MaxValue: 200

  DomainName:
    Type: String

  ListenerRulePriority:
    Type: Number
    Default: 110

  EntraClientSecretName:
    Type: String
    Default: Finops/entra-client-secret
    Description: Same Secrets Manager secret name used by the ALB stack.

  AirbyteVersion:
    Type: String
    Default: '0.63.14'
    Description: Airbyte OSS docker-compose version tag.

Resources:
  # --- IAM: SSM for shell access, Secrets read, CloudWatch write ---------
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: ReadSecrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue, secretsmanager:DescribeSecret]
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectTag}/*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # --- Security group ----------------------------------------------------
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectTag} Airbyte EC2 - ALB ingress only'
      VpcId: !ImportValue { Fn::Sub: '${VpcStackName}-VpcId' }
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !ImportValue { Fn::Sub: '${AlbStackName}-AlbSecurityGroupId' }
          Description: 'Airbyte webapp from ALB'
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-airbyte-sg' }
        - { Key: Project, Value: !Ref ProjectTag }

  RdsIngressFromAirbyte:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue { Fn::Sub: '${RdsStackName}-DbSecurityGroupId' }
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref InstanceSecurityGroup
      Description: 'Airbyte EC2 to RDS'

  # --- EC2 instance ------------------------------------------------------
  # Single-volume design: Airbyte metadata + docker data live on the root EBS.
  # If the instance is replaced, metadata is lost; recommended follow-up is
  # to reconfigure Airbyte to use external Postgres (our RDS) for metadata.
  # Until that's wired, treat the instance as replaceable and document
  # connector configs manually.
  Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal: { Timeout: PT40M }
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !ImportValue { Fn::Sub: '${VpcStackName}-PublicSubnet1Id' }
      SecurityGroupIds: [!Ref InstanceSecurityGroup]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref DataVolumeSizeGb
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          # Don't redirect to file — keep output in /var/log/cloud-init-output.log
          # so console-output capture works after rollback for diagnosis.

          # 1. Docker (Airbyte EC2 docs, verified via Context7)
          dnf install -y docker python3-pip
          systemctl enable --now docker
          usermod -aG docker ec2-user

          # 2. cfn-signal helper
          pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz

          # 3. abctl (Airbyte's official deployment tool — Kubernetes-based)
          ABCTL_TAG="${AbctlVersion}"
          curl -sSL -o /tmp/abctl.tar.gz \
            "https://github.com/airbytehq/abctl/releases/download/${!ABCTL_TAG}/abctl-${!ABCTL_TAG}-linux-arm64.tar.gz"
          tar -xzf /tmp/abctl.tar.gz -C /tmp
          install -m 0755 "/tmp/abctl-${!ABCTL_TAG}-linux-arm64/abctl" /usr/local/bin/abctl
          /usr/local/bin/abctl version

          # 4. Signal CFN early — instance is ready; Airbyte k8s install runs in
          #    the background and can take 15-30 min on first launch.
          for p in /usr/local/bin/cfn-signal /opt/aws/bin/cfn-signal; do
            if [ -x "${!p}" ]; then CFN_SIGNAL="${!p}"; break; fi
          done
          ${!CFN_SIGNAL:-cfn-signal} -e 0 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}

          # 5. Kick off Airbyte install in background (detached from UserData)
          LOW_RES=""
          if [ "${AirbyteLowResourceMode}" = "true" ]; then LOW_RES="--low-resource-mode"; fi
          nohup bash -c "/usr/local/bin/abctl local install --host finops.audiense.us --port 8000 --no-browser ${!LOW_RES}" \
            > /var/log/airbyte-startup.log 2>&1 &
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-airbyte' }
        - { Key: Project, Value: !Ref ProjectTag }

  # --- ALB target group + listener rule ---------------------------------
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectTag}-airbyte-tg'
      VpcId: !ImportValue { Fn::Sub: '${VpcStackName}-VpcId' }
      Protocol: HTTP
      Port: 8000
      TargetType: instance
      HealthCheckPath: /api/v1/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher: { HttpCode: '200' }
      Targets:
        - Id: !Ref Instance
          Port: 8000

  ListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !ImportValue { Fn::Sub: '${AlbStackName}-HttpsListenerArn' }
      Priority: !Ref ListenerRulePriority
      Conditions:
        - Field: host-header
          HostHeaderConfig: { Values: [!Sub 'airbyte.${DomainName}'] }
      # Rule-level OIDC auth; re-uses ALB stack's endpoint + ClientId exports.
      Actions:
        - Type: authenticate-oidc
          Order: 1
          AuthenticateOidcConfig:
            Issuer: !ImportValue { Fn::Sub: '${AlbStackName}-OidcIssuer' }
            AuthorizationEndpoint: !ImportValue { Fn::Sub: '${AlbStackName}-OidcAuthorizationEndpoint' }
            TokenEndpoint: !ImportValue { Fn::Sub: '${AlbStackName}-OidcTokenEndpoint' }
            UserInfoEndpoint: !ImportValue { Fn::Sub: '${AlbStackName}-OidcUserInfoEndpoint' }
            ClientId: !ImportValue { Fn::Sub: '${AlbStackName}-OidcClientId' }
            ClientSecret: !Sub '{{resolve:secretsmanager:${EntraClientSecretName}:SecretString:client_secret}}'
            Scope: 'openid email profile'
            SessionTimeout: 28800
            OnUnauthenticatedRequest: authenticate
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref TargetGroup

Outputs:
  InstanceId:
    Value: !Ref Instance

  AirbyteUrl:
    Value: !Sub 'https://airbyte.${DomainName}'
