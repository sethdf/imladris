AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FinOps - SSO front door. Internet-facing ALB with HTTPS listener
  that authenticates directly against Microsoft Entra ID via OIDC (no Cognito
  layer). All tools (Metabase, Airbyte, future) sit behind this ALB; users
  SSO once via Microsoft 365. Single-phase deploy: create an Entra app
  registration in Azure first, store the client secret in Secrets Manager,
  then deploy this stack with the tenant/client IDs and the secret's name.
  Sibling stacks add per-tool listener rules by importing HttpsListenerArn
  and the OIDC endpoint exports.

Parameters:
  ProjectTag:
    Type: String
    Default: Finops

  VpcStackName:
    Type: String
    Description: finops-vpc stack name (for VPC + public subnet imports).

  DomainName:
    Type: String
    Description: >
      Public DNS name the ALB will serve, e.g. warehouse.buxton.com.
      ACM cert + Route53 record are created for this name and wildcard subdomain.

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route53 Hosted Zone ID that owns DomainName.

  EntraTenantId:
    Type: String
    Description: >
      Entra (Azure AD) Tenant ID, e.g. 11111111-2222-3333-4444-555555555555.
      Found in Azure portal → Entra ID → Overview → Directory (tenant) ID.

  EntraClientId:
    Type: String
    Description: >
      Application (client) ID from Azure → App Registrations → <your app>.
      This is the OIDC app created specifically for this ALB.

  EntraClientSecretName:
    Type: String
    Default: Finops/entra-client-secret
    Description: >
      Name (not ARN) of a Secrets Manager secret with JSON:
        {"client_secret":"<value from Entra app → Certificates & secrets>"}
      The ALB resolves this at deploy time via CFN dynamic reference.
      Create BEFORE deploying this stack.

  SessionTimeoutSeconds:
    Type: Number
    Default: 28800     # 8 hours
    MinValue: 300
    MaxValue: 604800

Resources:
  # --- ACM cert (DNS validation) ------------------------------------------
  # ACM issues ONE CNAME validation record that covers both the apex and the
  # wildcard (they share the same validation token). Listing both in
  # DomainValidationOptions causes CFN to attempt duplicate CNAME creation
  # and fail with InvalidChangeBatch. List apex only; wildcard still works
  # because it's in SubjectAlternativeNames.
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub '*.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - { Key: Project, Value: !Ref ProjectTag }

  # --- ALB + security group ----------------------------------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectTag} ALB - public HTTPS only'
      VpcId: !ImportValue { Fn::Sub: '${VpcStackName}-VpcId' }
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0, Description: 'HTTPS from internet' }
        - { IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: 0.0.0.0/0, Description: 'HTTP (redirected to HTTPS)' }
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-alb-sg' }
        - { Key: Project, Value: !Ref ProjectTag }

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectTag}-alb'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets: !Split
        - ','
        - !ImportValue { Fn::Sub: '${VpcStackName}-PublicSubnetIds' }
      SecurityGroups: [!Ref AlbSecurityGroup]
      LoadBalancerAttributes:
        - { Key: idle_timeout.timeout_seconds, Value: '60' }
        - { Key: routing.http.drop_invalid_header_fields.enabled, Value: 'true' }
        - { Key: routing.http2.enabled, Value: 'true' }
      Tags:
        - { Key: Project, Value: !Ref ProjectTag }

  # --- HTTPS listener: default action is Entra OIDC auth → 404 fallback --
  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: authenticate-oidc
          Order: 1
          AuthenticateOidcConfig:
            Issuer: !Sub 'https://login.microsoftonline.com/${EntraTenantId}/v2.0'
            AuthorizationEndpoint: !Sub 'https://login.microsoftonline.com/${EntraTenantId}/oauth2/v2.0/authorize'
            TokenEndpoint: !Sub 'https://login.microsoftonline.com/${EntraTenantId}/oauth2/v2.0/token'
            UserInfoEndpoint: 'https://graph.microsoft.com/oidc/userinfo'
            ClientId: !Ref EntraClientId
            ClientSecret: !Sub '{{resolve:secretsmanager:${EntraClientSecretName}:SecretString:client_secret}}'
            Scope: 'openid email profile'
            SessionTimeout: !Ref SessionTimeoutSeconds
            OnUnauthenticatedRequest: authenticate
        - Type: fixed-response
          Order: 2
          FixedResponseConfig:
            StatusCode: '404'
            ContentType: text/plain
            MessageBody: 'No tool mounted at this path. Add a listener rule in the tool stack.'

  HttpListenerRedirect:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # --- DNS records --------------------------------------------------------
  DomainAlias:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID
        DNSName: !GetAtt LoadBalancer.DNSName
        EvaluateTargetHealth: false

  WildcardAlias:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '*.${DomainName}'
      Type: A
      AliasTarget:
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID
        DNSName: !GetAtt LoadBalancer.DNSName
        EvaluateTargetHealth: false

Outputs:
  AlbArn:
    Value: !Ref LoadBalancer
    Export: { Name: !Sub '${AWS::StackName}-AlbArn' }

  AlbDnsName:
    Value: !GetAtt LoadBalancer.DNSName
    Export: { Name: !Sub '${AWS::StackName}-AlbDnsName' }

  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Description: 'Reference in tool SGs to allow ALB → task traffic.'
    Export: { Name: !Sub '${AWS::StackName}-AlbSecurityGroupId' }

  HttpsListenerArn:
    Value: !Ref HttpsListener
    Description: 'Sibling stacks attach listener rules to this ARN.'
    Export: { Name: !Sub '${AWS::StackName}-HttpsListenerArn' }

  # OIDC config exports - sibling stacks re-use these on their per-tool rules
  OidcIssuer:
    Value: !Sub 'https://login.microsoftonline.com/${EntraTenantId}/v2.0'
    Export: { Name: !Sub '${AWS::StackName}-OidcIssuer' }

  OidcAuthorizationEndpoint:
    Value: !Sub 'https://login.microsoftonline.com/${EntraTenantId}/oauth2/v2.0/authorize'
    Export: { Name: !Sub '${AWS::StackName}-OidcAuthorizationEndpoint' }

  OidcTokenEndpoint:
    Value: !Sub 'https://login.microsoftonline.com/${EntraTenantId}/oauth2/v2.0/token'
    Export: { Name: !Sub '${AWS::StackName}-OidcTokenEndpoint' }

  OidcUserInfoEndpoint:
    Value: 'https://graph.microsoft.com/oidc/userinfo'
    Export: { Name: !Sub '${AWS::StackName}-OidcUserInfoEndpoint' }

  OidcClientId:
    Value: !Ref EntraClientId
    Export: { Name: !Sub '${AWS::StackName}-OidcClientId' }

  EntraAppRedirectUri:
    Value: !Sub 'https://${DomainName}/oauth2/idpresponse'
    Description: >
      Add this to your Entra app registration → Authentication → Redirect URIs,
      along with https://metabase.${DomainName}/oauth2/idpresponse and
      https://airbyte.${DomainName}/oauth2/idpresponse.
