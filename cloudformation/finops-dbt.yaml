AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FinOps - dbt Core as a scheduled ECS Fargate task. ECR repo holds
  the image (engineers build + push locally or from CI); EventBridge triggers a
  one-shot task daily. Task reads DB credentials from Secrets Manager, runs
  `dbt run` + `dbt test`, and exits. Logs stream to CloudWatch. No ALB, no
  listener - this is batch compute only. dbt docs (if published) would be a
  separate stack that syncs a build artifact to S3 + puts it behind the ALB.

Parameters:
  ProjectTag:
    Type: String
    Default: Finops

  VpcStackName:
    Type: String

  RdsStackName:
    Type: String

  EcsStackName:
    Type: String

  ScheduleExpression:
    Type: String
    Default: 'cron(0 8 * * ? *)'
    Description: EventBridge cron. Default = 08:00 UTC (03:00-04:00 ET) daily.

  TaskCpu:
    Type: String
    Default: '512'
    AllowedValues: ['256', '512', '1024', '2048']

  TaskMemory:
    Type: String
    Default: '1024'
    AllowedValues: ['512', '1024', '2048', '4096']

  ImageTag:
    Type: String
    Default: latest
    Description: Tag in the ECR repo to run. Override for pinned prod.

  ScheduleState:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: EventBridge schedule state. Deploy DISABLED until image is pushed.

Resources:
  Repository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: finops/dbt
      ImageScanningConfiguration: { ScanOnPush: true }
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          { "rules": [ { "rulePriority": 1, "description": "keep last 10 images",
                         "selection": { "tagStatus": "any", "countType": "imageCountMoreThan",
                                        "countNumber": 10 }, "action": { "type": "expire" } } ] }
      Tags:
        - { Key: Project, Value: !Ref ProjectTag }

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectTag}/dbt
      RetentionInDays: 30

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadDbSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue, secretsmanager:DescribeSecret]
                Resource: !ImportValue { Fn::Sub: '${RdsStackName}-MasterSecretArn' }

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectTag} dbt task - no ingress; egress to RDS + ECR'
      VpcId: !ImportValue { Fn::Sub: '${VpcStackName}-VpcId' }
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-dbt-sg' }
        - { Key: Project, Value: !Ref ProjectTag }

  RdsIngressFromDbt:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue { Fn::Sub: '${RdsStackName}-DbSecurityGroupId' }
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref TaskSecurityGroup
      Description: 'dbt Fargate to RDS'

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectTag}-dbt'
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !ImportValue { Fn::Sub: '${EcsStackName}-TaskExecutionRoleArn' }
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: dbt
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/finops/dbt:${ImageTag}'
          Essential: true
          Environment:
            - { Name: DBT_HOST, Value: !ImportValue { Fn::Sub: '${RdsStackName}-DbEndpoint' } }
            - { Name: DBT_DBNAME, Value: !ImportValue { Fn::Sub: '${RdsStackName}-DbName' } }
            - { Name: DBT_PORT, Value: '5432' }
          Secrets:
            - Name: DBT_USER
              ValueFrom: !Sub
                - '${Arn}:username::'
                - { Arn: !ImportValue { Fn::Sub: '${RdsStackName}-MasterSecretArn' } }
            - Name: DBT_PASSWORD
              ValueFrom: !Sub
                - '${Arn}:password::'
                - { Arn: !ImportValue { Fn::Sub: '${RdsStackName}-MasterSecretArn' } }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: dbt

  # EventBridge role to invoke RunTask
  EventsInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: events.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunTask
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref TaskDefinition
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskRole.Arn
                  - !ImportValue { Fn::Sub: '${EcsStackName}-TaskExecutionRoleArn' }

  # Uses CapacityProviderStrategy (not LaunchType) so FARGATE_SPOT is actually
  # selected. LaunchType:FARGATE bypasses the cluster's default strategy.
  ScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectTag}-dbt-daily'
      ScheduleExpression: !Ref ScheduleExpression
      State: !Ref ScheduleState
      Targets:
        - Id: dbt-task
          Arn: !ImportValue { Fn::Sub: '${EcsStackName}-ClusterArn' }
          RoleArn: !GetAtt EventsInvokeRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref TaskDefinition
            CapacityProviderStrategy:
              - { CapacityProvider: FARGATE_SPOT, Weight: 1 }
            NetworkConfiguration:
              AwsVpcConfiguration:
                AssignPublicIp: ENABLED
                Subnets: !Split
                  - ','
                  - !ImportValue { Fn::Sub: '${VpcStackName}-PublicSubnetIds' }
                SecurityGroups: [!Ref TaskSecurityGroup]

Outputs:
  RepositoryUri:
    Value: !GetAtt Repository.RepositoryUri
    Description: 'Push dbt image here: docker push $(this):latest'

  TaskDefinitionArn:
    Value: !Ref TaskDefinition
