AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FinOps - Reverse-ETL task. Scheduled Fargate job that reads from
  the `marts` schema (e.g., partner_white_label_customers view) and writes
  back to Salesforce via REST API (Partner_Relationship__c records). Mirrors
  the dbt stack pattern: ECR repo for the Python image, EventBridge cron
  trigger, task reads DB creds + Salesforce creds from Secrets Manager.
  DEPENDENCY: `marts` schema is created by dbt on first successful run. The
  first reverse-ETL invocation must follow at least one dbt run; default
  schedules (dbt=08:00 UTC, reverse-ETL=09:00 UTC) stagger accordingly.
  Uses FARGATE_SPOT via CapacityProviderStrategy to save ~70% on compute for
  this batch workload (retries on interrupt are tolerable).

Parameters:
  ProjectTag:
    Type: String
    Default: Finops

  VpcStackName:
    Type: String

  RdsStackName:
    Type: String

  EcsStackName:
    Type: String

  SalesforceSecretArn:
    Type: String
    Description: >
      ARN of a Secrets Manager secret with JSON:
      {"client_id":"...","client_secret":"...","username":"...","password":"...","security_token":"...","domain":"login"}
      Create via AWS CLI before deploying - secret must live under
      arn:aws:secretsmanager:...:secret:Finops/salesforce-api-*

  ScheduleExpression:
    Type: String
    Default: 'cron(0 9 * * ? *)'
    Description: 09:00 UTC daily (1h after dbt run completes at 08:00).

  TaskCpu:
    Type: String
    Default: '256'
    AllowedValues: ['256', '512', '1024']

  TaskMemory:
    Type: String
    Default: '512'
    AllowedValues: ['512', '1024', '2048']

  ImageTag:
    Type: String
    Default: latest

  ScheduleState:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: EventBridge schedule state. Deploy DISABLED until Salesforce creds are provided.

Resources:
  Repository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: finops/reverse-etl
      ImageScanningConfiguration: { ScanOnPush: true }
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          { "rules": [ { "rulePriority": 1, "description": "keep last 10 images",
                         "selection": { "tagStatus": "any", "countType": "imageCountMoreThan",
                                        "countNumber": 10 }, "action": { "type": "expire" } } ] }
      Tags:
        - { Key: Project, Value: !Ref ProjectTag }

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectTag}/reverse-etl
      RetentionInDays: 30

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadSecrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue, secretsmanager:DescribeSecret]
                Resource:
                  - !ImportValue { Fn::Sub: '${RdsStackName}-MasterSecretArn' }
                  - !Ref SalesforceSecretArn

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectTag} reverse-ETL task - egress to RDS + Salesforce API'
      VpcId: !ImportValue { Fn::Sub: '${VpcStackName}-VpcId' }
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-revetl-sg' }
        - { Key: Project, Value: !Ref ProjectTag }

  RdsIngressFromRevEtl:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue { Fn::Sub: '${RdsStackName}-DbSecurityGroupId' }
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref TaskSecurityGroup
      Description: 'reverse-ETL Fargate to RDS'

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectTag}-reverse-etl'
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !ImportValue { Fn::Sub: '${EcsStackName}-TaskExecutionRoleArn' }
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: reverse-etl
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/finops/reverse-etl:${ImageTag}'
          Essential: true
          Environment:
            - { Name: DB_HOST, Value: !ImportValue { Fn::Sub: '${RdsStackName}-DbEndpoint' } }
            - { Name: DB_NAME, Value: !ImportValue { Fn::Sub: '${RdsStackName}-DbName' } }
            - { Name: DB_PORT, Value: '5432' }
            - { Name: MODELS,  Value: 'partner_white_label' }
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub
                - '${Arn}:username::'
                - { Arn: !ImportValue { Fn::Sub: '${RdsStackName}-MasterSecretArn' } }
            - Name: DB_PASSWORD
              ValueFrom: !Sub
                - '${Arn}:password::'
                - { Arn: !ImportValue { Fn::Sub: '${RdsStackName}-MasterSecretArn' } }
            - Name: SF_CLIENT_ID
              ValueFrom: !Sub '${SalesforceSecretArn}:client_id::'
            - Name: SF_CLIENT_SECRET
              ValueFrom: !Sub '${SalesforceSecretArn}:client_secret::'
            - Name: SF_USERNAME
              ValueFrom: !Sub '${SalesforceSecretArn}:username::'
            - Name: SF_PASSWORD
              ValueFrom: !Sub '${SalesforceSecretArn}:password::'
            - Name: SF_SECURITY_TOKEN
              ValueFrom: !Sub '${SalesforceSecretArn}:security_token::'
            - Name: SF_DOMAIN
              ValueFrom: !Sub '${SalesforceSecretArn}:domain::'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: reverse-etl

  EventsInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: events.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunTask
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref TaskDefinition
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskRole.Arn
                  - !ImportValue { Fn::Sub: '${EcsStackName}-TaskExecutionRoleArn' }

  # Uses CapacityProviderStrategy (not LaunchType) so FARGATE_SPOT is actually
  # selected. LaunchType:FARGATE bypasses the cluster's default strategy.
  ScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectTag}-revetl-daily'
      ScheduleExpression: !Ref ScheduleExpression
      State: !Ref ScheduleState
      Targets:
        - Id: revetl-task
          Arn: !ImportValue { Fn::Sub: '${EcsStackName}-ClusterArn' }
          RoleArn: !GetAtt EventsInvokeRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref TaskDefinition
            CapacityProviderStrategy:
              - { CapacityProvider: FARGATE_SPOT, Weight: 1 }
            NetworkConfiguration:
              AwsVpcConfiguration:
                AssignPublicIp: ENABLED
                Subnets: !Split
                  - ','
                  - !ImportValue { Fn::Sub: '${VpcStackName}-PublicSubnetIds' }
                SecurityGroups: [!Ref TaskSecurityGroup]

Outputs:
  RepositoryUri:
    Value: !GetAtt Repository.RepositoryUri

  TaskDefinitionArn:
    Value: !Ref TaskDefinition
