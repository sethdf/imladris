AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FinOps - Metabase OSS on Fargate. Single-task service behind the
  shared ALB at https://metabase.{DomainName}. Metabase app-DB lives in a
  dedicated database `metabase_app` in the shared RDS instance. BEFORE FIRST
  DEPLOY: connect to RDS as master user and run:
    CREATE DATABASE metabase_app;
    CREATE USER metabase_app WITH PASSWORD '<from MetabaseAppSecret>';
    GRANT ALL PRIVILEGES ON DATABASE metabase_app TO metabase_app;
  Metabase creates its own tables via MB_DB_AUTOMIGRATE on first start.
  User-facing SSO is enforced at the ALB (Cognito -> Entra); Metabase keeps
  its own login page (dual-login accepted; revisit with JWT bridge later).
  Use FARGATE (not FARGATE_SPOT) so a Spot reclaim doesn't log out users.

Parameters:
  ProjectTag:
    Type: String
    Default: Finops

  VpcStackName:
    Type: String

  RdsStackName:
    Type: String

  AlbStackName:
    Type: String

  EcsStackName:
    Type: String

  MetabaseAppSecretArn:
    Type: String
    Description: >
      ARN of a Secrets Manager secret with JSON {"username":"metabase_app",
      "password":"..."} - the DB user that owns the metabase_app schema.
      Create this out-of-band (it's not the RDS master secret).

  MetabaseImage:
    Type: String
    Default: metabase/metabase:v0.59.7
    Description: Pin the image tag; bump deliberately. Check docker.io/metabase/metabase for latest stable.

  DomainName:
    Type: String
    Description: Top-level domain passed to the ALB stack (e.g., warehouse.buxton.com). Metabase lives at metabase.{this}.

  # Raised from 0.5 vCPU / 2 GB after perf audit: a single 0.5 vCPU task with
  # DesiredCount=1 serializes dashboard queries; Metabase JVM baseline is
  # 1-1.5 GB idle. 1 vCPU / 4 GB handles ~10 concurrent analysts comfortably
  # on RDS-backed sessions (stateless; can raise DesiredCount later if needed).
  TaskCpu:
    Type: String
    Default: '1024'     # 1 vCPU
    AllowedValues: ['256', '512', '1024', '2048']

  TaskMemory:
    Type: String
    Default: '4096'     # 4 GB
    AllowedValues: ['1024', '2048', '4096', '8192']

  ListenerRulePriority:
    Type: Number
    Default: 100
    Description: >
      Must be unique across all rules on the shared listener. Convention:
      Metabase=100, Airbyte=110, dbt-docs=120, reverse-etl-ui=130.

  EntraClientSecretName:
    Type: String
    Default: Finops/entra-client-secret
    Description: Same Secrets Manager secret name used by the ALB stack.

Resources:
  # --- Log group ----------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectTag}/metabase
      RetentionInDays: 30

  # --- Task role (runtime perms - connecting to RDS with IAM auth later) -
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchMetrics
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'

  # --- Security group (accepts 3000 only from ALB SG) --------------------
  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectTag} Metabase - ALB ingress only'
      VpcId: !ImportValue
        Fn::Sub: '${VpcStackName}-VpcId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !ImportValue
            Fn::Sub: '${AlbStackName}-AlbSecurityGroupId'
          Description: 'Metabase HTTP from ALB'
      Tags:
        - { Key: Name, Value: !Sub '${ProjectTag}-metabase-sg' }
        - { Key: Project, Value: !Ref ProjectTag }

  # Also open 5432 on the RDS SG for this service's SG
  RdsIngressFromMetabase:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue
        Fn::Sub: '${RdsStackName}-DbSecurityGroupId'
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref ServiceSecurityGroup
      Description: 'Metabase to RDS'

  # --- Task definition ---------------------------------------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectTag}-metabase'
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !ImportValue
        Fn::Sub: '${EcsStackName}-TaskExecutionRoleArn'
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: metabase
          Image: !Ref MetabaseImage
          Essential: true
          PortMappings:
            - { ContainerPort: 3000, Protocol: tcp }
          Environment:
            - { Name: MB_DB_TYPE,    Value: postgres }
            - { Name: MB_DB_HOST,    Value: !ImportValue { Fn::Sub: '${RdsStackName}-DbEndpoint' } }
            - { Name: MB_DB_PORT,    Value: '5432' }
            - { Name: MB_DB_DBNAME,  Value: metabase_app }   # dedicated DB; see header for pre-deploy SQL
            - { Name: MB_SITE_URL,   Value: !Sub 'https://metabase.${DomainName}' }
            - { Name: JAVA_TIMEZONE, Value: America/New_York }
            # SSO trust - ALB Cognito action sets x-amzn-oidc-data header
            - { Name: MB_JWT_SHARED_SECRET, Value: '' }  # not used when ALB handles auth
          Secrets:
            - Name: MB_DB_USER
              ValueFrom: !Sub '${MetabaseAppSecretArn}:username::'
            - Name: MB_DB_PASS
              ValueFrom: !Sub '${MetabaseAppSecretArn}:password::'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: metabase
          HealthCheck:
            Command: [CMD-SHELL, "curl -f http://localhost:3000/api/health || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 120

  # --- Target group ------------------------------------------------------
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectTag}-metabase-tg'
      VpcId: !ImportValue
        Fn::Sub: '${VpcStackName}-VpcId'
      Protocol: HTTP
      Port: 3000
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher: { HttpCode: '200' }
      TargetGroupAttributes:
        - { Key: deregistration_delay.timeout_seconds, Value: '30' }
        - { Key: stickiness.enabled, Value: 'true' }
        - { Key: stickiness.type, Value: lb_cookie }
        - { Key: stickiness.lb_cookie.duration_seconds, Value: '86400' }

  # --- Listener rule: host-header metabase.{DomainName} -> this TG -------
  ListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !ImportValue
        Fn::Sub: '${AlbStackName}-HttpsListenerArn'
      Priority: !Ref ListenerRulePriority
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Sub 'metabase.${DomainName}'
      # Rule-level auth must be re-declared (listener default does NOT
      # cascade to matched rules). Re-using OIDC endpoint + ClientId exports
      # from the Entra ALB stack; ClientSecret resolved via Secrets Manager
      # dynamic reference at deploy time.
      Actions:
        - Type: authenticate-oidc
          Order: 1
          AuthenticateOidcConfig:
            Issuer: !ImportValue { Fn::Sub: '${AlbStackName}-OidcIssuer' }
            AuthorizationEndpoint: !ImportValue { Fn::Sub: '${AlbStackName}-OidcAuthorizationEndpoint' }
            TokenEndpoint: !ImportValue { Fn::Sub: '${AlbStackName}-OidcTokenEndpoint' }
            UserInfoEndpoint: !ImportValue { Fn::Sub: '${AlbStackName}-OidcUserInfoEndpoint' }
            ClientId: !ImportValue { Fn::Sub: '${AlbStackName}-OidcClientId' }
            ClientSecret: !Sub '{{resolve:secretsmanager:${EntraClientSecretName}:SecretString:client_secret}}'
            Scope: 'openid email profile'
            SessionTimeout: 28800
            OnUnauthenticatedRequest: authenticate
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref TargetGroup

  # --- Service -----------------------------------------------------------
  Service:
    Type: AWS::ECS::Service
    DependsOn: ListenerRule
    Properties:
      ServiceName: !Sub '${ProjectTag}-metabase'
      Cluster: !ImportValue
        Fn::Sub: '${EcsStackName}-ClusterName'
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      DeploymentConfiguration:
        MinimumHealthyPercent: 0     # only 1 task; allow full replacement
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Split
            - ','
            - !ImportValue { Fn::Sub: '${VpcStackName}-PublicSubnetIds' }
          SecurityGroups: [!Ref ServiceSecurityGroup]
      LoadBalancers:
        - ContainerName: metabase
          ContainerPort: 3000
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 180
      PropagateTags: SERVICE
      Tags:
        - { Key: Project, Value: !Ref ProjectTag }

Outputs:
  ServiceName:
    Value: !Ref Service

  TargetGroupArn:
    Value: !Ref TargetGroup

  MetabaseUrl:
    Value: !Sub 'https://metabase.${DomainName}'
    Description: 'SSO-gated Metabase URL'
