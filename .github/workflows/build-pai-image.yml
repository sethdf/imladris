name: Build PAI container image

on:
  push:
    branches: [main]
    paths:
      - 'docker/pai/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/pai
          push: true
          tags: |
            ghcr.io/sethdf/imladris/pai:latest
            ghcr.io/sethdf/imladris/pai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
