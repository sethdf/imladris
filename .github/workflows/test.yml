name: Test

on:
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'windmill/f/**/*.ts'
      - '.claude/hooks/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install
        working-directory: tests

      - name: Hook tests
        run: bun test hooks/ --timeout 30000
        working-directory: tests
        continue-on-error: false

      - name: Windmill script tests
        run: bun test windmill/ --timeout 30000
        working-directory: tests
        continue-on-error: false

      - name: CLI tests
        run: bun test cli/ --timeout 30000
        working-directory: tests
        continue-on-error: false
