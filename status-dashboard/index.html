<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Imladris Status</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e1e4eb;--dim:#6b7280;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.dash{max-width:960px;margin:0 auto;padding:24px 16px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
h1{font-size:20px;font-weight:600}
.ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.modes{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.modes .btn{border-radius:0;border:none;border-right:1px solid var(--border)}
.modes .btn:last-child{border-right:none}
.btn{padding:6px 14px;background:var(--surface);border:1px solid var(--border);color:var(--dim);border-radius:var(--r);cursor:pointer;font-size:13px;transition:all .15s}
.btn:hover{color:var(--text);background:var(--border)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.on{color:var(--blue);border-color:var(--blue);background:rgba(59,130,246,.1)}
/* Tab nav */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.meta{display:flex;gap:16px;font-size:12px;color:var(--dim);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.err{background:rgba(239,68,68,.1);border:1px solid var(--red);color:var(--red);padding:10px 14px;border-radius:var(--r);margin-bottom:16px;font-size:13px}
.gotchas{padding:12px 16px;border-radius:var(--r);margin-bottom:16px;font-size:14px}
.g-ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.g-warn{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.3)}
.g-title{color:var(--yellow);font-weight:600;margin-bottom:6px}
.g-warn ul{margin-left:24px;color:var(--text)}.g-warn li{margin-bottom:2px}
.sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.sec-h{padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;user-select:none;transition:background .15s}
.sec-h:hover{background:rgba(255,255,255,.03)}
.sec-b{padding:12px 14px;border-top:1px solid var(--border)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.cl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-bottom:4px}
.cv{font-size:24px;font-weight:700}
.cv-sm{font-size:13px;font-weight:500}
.cs{font-size:11px;color:var(--dim);margin-top:4px}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
.b-ok{background:rgba(34,197,94,.15);color:var(--green)}
.b-fail{background:rgba(239,68,68,.15);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);border-bottom:1px solid var(--border)}
td{padding:6px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.tg{color:var(--green)}.tr{color:var(--red)}.ty{color:var(--yellow)}.td{color:var(--dim)}
.mono{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:12px}
.empty{text-align:center;padding:60px 0;color:var(--dim);font-size:14px}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Triage-specific */
.triage-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.triage-toolbar .modes{margin-right:auto}
.bulk-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.3);border-radius:var(--r);margin-bottom:12px;font-size:13px;flex-wrap:wrap}
.bulk-bar .count{color:var(--blue);font-weight:600;margin-right:4px}
.triage-table th:first-child,.triage-table td:first-child{width:32px;text-align:center}
.action-badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600}
.ab-queue{background:rgba(234,179,8,.15);color:var(--yellow)}
.ab-auto{background:rgba(107,114,128,.15);color:var(--dim)}
.ab-notify{background:rgba(59,130,246,.15);color:var(--blue)}
.ab-other{background:rgba(255,255,255,.08);color:var(--text)}
.urg-critical{color:var(--red);font-weight:600}
.urg-high{color:var(--yellow)}
.urg-medium,.urg-low{color:var(--dim)}
input[type=checkbox]{accent-color:var(--blue);width:14px;height:14px;cursor:pointer}
/* AI stub */
.stub-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px;text-align:center;margin-top:12px}
.stub-title{font-size:18px;font-weight:600;margin-bottom:8px}
.stub-desc{color:var(--dim);font-size:14px;max-width:500px;margin:0 auto 12px}
.stub-tag{display:inline-block;padding:3px 12px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--blue);border-radius:12px;font-size:12px;font-weight:600}
</style>
</head>
<body>
<div class="dash" id="app"></div>
<script>
const WM_BASE = window.location.pathname.replace(/\/+$/, '');
const WM_PATH = '/api/w/imladris/jobs/run_wait_result/p/f/imladris/status_check';

let state = {
  tab: 'status',
  // status tab
  data: null, loading: false, mode: 'quick', auto: false, error: null, collapsed: {},
  // triage tab
  triageItems: [], triageTotal: 0, triageLoading: false, triageError: null,
  triageFilter: 'all', triageSelected: new Set(), triageBulking: false,
  // sessions tab
  sessions: [], sessionsLoading: false,
  // mcp calls tab
  mcpCalls: [], mcpTotal: 0, mcpLoading: false,
  // ai activity tab
  aiActivity: null, aiLoading: false,
  // integrations tab
  integrations: null, integrationsLoading: false, intDomain: '',
};
let autoTimer = null;

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'onclick') el.onclick = v;
    else if (k === 'onchange') el.onchange = v;
    else if (k === 'className') el.className = v;
    else if (v != null) el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function badge(ok, label) {
  return h('span', { className: `badge ${ok ? 'b-ok' : 'b-fail'}` }, `${ok ? '\u2713' : '\u2717'} ${label}`);
}

// ── Status tab logic ──

async function runCheck(m) {
  const mode = m || state.mode;
  state.loading = true; state.error = null; render();
  try {
    const resp = await fetch(WM_BASE + WM_PATH, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode }),
    });
    if (!resp.ok) throw new Error(`API error: ${resp.status}`);
    state.data = await resp.json();
  } catch (e) { state.error = e.message; }
  state.loading = false; render();
}

function toggleSection(key) { state.collapsed[key] = !state.collapsed[key]; render(); }
function setMode(m) { state.mode = m; runCheck(m); }
function toggleAuto() {
  state.auto = !state.auto;
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  if (state.auto) autoTimer = setInterval(() => runCheck(), 30000);
  render();
}

// ── Triage tab logic ──

async function loadTriage() {
  state.triageLoading = true; state.triageError = null; render();
  try {
    const url = `/triage/queue?action=${state.triageFilter}&limit=50&offset=0`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`Triage API error: ${resp.status}`);
    const data = await resp.json();
    state.triageItems = data.items || [];
    state.triageTotal = data.total || 0;
  } catch (e) { state.triageError = e.message; }
  state.triageSelected = new Set();
  state.triageLoading = false;
  render();
}

async function bulkAction(action) {
  const ids = Array.from(state.triageSelected);
  if (!ids.length) return;
  state.triageBulking = true; render();
  try {
    const resp = await fetch('/triage/bulk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids, bulk_action: action }),
    });
    if (!resp.ok) throw new Error(`Bulk action error: ${resp.status}`);
  } catch (e) { state.triageError = e.message; }
  state.triageBulking = false;
  await loadTriage();
}

function setTriageFilter(f) {
  state.triageFilter = f;
  loadTriage();
}

function toggleSelectAll(checked) {
  if (checked) { state.triageItems.forEach(item => state.triageSelected.add(item.id)); }
  else { state.triageSelected.clear(); }
  render();
}

function toggleSelectItem(id, checked) {
  if (checked) state.triageSelected.add(id); else state.triageSelected.delete(id);
  render();
}

// ── Render helpers ──

function section(key, title, content) {
  const col = state.collapsed[key];
  return h('div', { className: 'sec' },
    h('div', { className: 'sec-h', onclick: () => toggleSection(key) }, `${col ? '\u25b6' : '\u25bc'} ${title}`),
    col ? null : h('div', { className: 'sec-b' }, content)
  );
}

function renderGotchas(g) {
  if (!g || g.length === 0) return h('div', { className: 'gotchas g-ok' }, '\u2713 All clear \u2014 no issues detected');
  return h('div', { className: 'gotchas g-warn' },
    h('div', { className: 'g-title' }, `\u26a0 ${g.length} issue${g.length > 1 ? 's' : ''} detected`),
    h('ul', null, ...g.map(t => h('li', null, t)))
  );
}

function renderDisk(disk) {
  if (!Array.isArray(disk)) return h('pre', null, JSON.stringify(disk, null, 2));
  return h('div', { className: 'cg' }, ...disk.map(d =>
    h('div', { className: 'card' },
      h('div', { className: 'cl' }, d.mounted),
      h('div', { className: `cv ${d.use_pct > 80 ? 'tr' : d.use_pct > 60 ? 'ty' : 'tg'}` }, `${d.use_pct}%`),
      h('div', { className: 'cs' }, `${Math.round(d.used_kb/1024/1024)}G / ${Math.round(d.size_kb/1024/1024)}G`)
    )
  ));
}

function renderCache(c) {
  if (!c) return null;
  if (c.error) return h('div', { className: 'tr' }, c.error);
  if (!c.exists) return h('div', { className: 'tr' }, 'Cache not found');
  return h('div', { className: 'cg' },
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Size'), h('div', { className: 'cv' }, `${c.size_mb} MB`)),
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Age'), h('div', { className: `cv ${c.age_hours > 24 ? 'tr' : c.age_hours > 12 ? 'ty' : 'tg'}` }, `${c.age_hours}h`)),
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Modified'), h('div', { className: 'cv cv-sm' }, new Date(c.last_modified).toLocaleString()))
  );
}

function renderWindmill(w) {
  if (!w) return null;
  if (w.error) return h('div', { className: 'tr' }, w.error);
  const cards = h('div', { className: 'cg' },
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Version'), h('div', { className: 'cv cv-sm' }, w.version)),
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Workers'), h('div', { className: 'cv tg' }, `${w.worker_count}`))
  );
  if (!w.workers?.length) return cards;
  const tbl = h('table', null,
    h('thead', null, h('tr', null, h('th', null, 'Worker'), h('th', null, 'Group'), h('th', null, 'Jobs'), h('th', null, 'Ping'))),
    h('tbody', null, ...w.workers.map(wr =>
      h('tr', null, h('td', { className: 'mono' }, wr.worker), h('td', null, wr.group), h('td', null, `${wr.jobs_executed}`), h('td', null, `${wr.last_ping}s`))
    ))
  );
  return h('div', null, cards, tbl);
}

function scheduleShortName(path) {
  // Strip leading f/<folder>/ and trailing _schedule
  return path.replace(/^f\/[^/]+\//, '').replace(/_schedule$/, '');
}

function renderSchedules(sched) {
  if (!Array.isArray(sched)) return h('pre', null, JSON.stringify(sched, null, 2));
  return h('table', null,
    h('thead', null, h('tr', null, h('th', null, 'Schedule'), h('th', null, 'Cron'), h('th', null, 'Last Run'), h('th', null, 'Status'))),
    h('tbody', null, ...sched.map(s =>
      h('tr', null,
        h('td', { className: 'mono' }, scheduleShortName(s.path)),
        h('td', { className: 'mono' }, s.schedule),
        h('td', null, s.last_run?.started_at ? new Date(s.last_run.started_at).toLocaleString() : '\u2014'),
        h('td', null, badge(s.last_run?.success === true, s.last_run?.success ? 'ok' : 'fail'))
      )
    ))
  );
}

function renderInfra(box) {
  return h('div', { className: 'cg' },
    h('div', { className: 'card' },
      h('div', { className: 'cl' }, 'Tailscale'),
      badge(box.tailscale?.reachable, box.tailscale?.reachable ? 'reachable' : 'down'),
      box.tailscale?.method ? h('div', { className: 'cs' }, box.tailscale.method) : null
    ),
    h('div', { className: 'card' },
      h('div', { className: 'cl' }, 'Steampipe'),
      badge(box.steampipe?.reachable, box.steampipe?.reachable ? 'reachable' : 'down'),
      h('div', { className: 'cs' }, `${box.steampipe?.host}:${box.steampipe?.port}`)
    ),
    h('div', { className: 'card' },
      h('div', { className: 'cl' }, 'Docker'),
      box.docker?.available === false
        ? h('div', { className: 'cs td' }, box.docker.note)
        : badge((box.docker?.count ?? 0) >= 6, `${box.docker?.count ?? 0} containers`)
    )
  );
}

function renderAws(aws) {
  if (!aws) return null;
  if (aws.error) return h('div', { className: 'tr' }, aws.error);
  const ca = aws.cross_accounts;
  const cards = h('div', { className: 'cg' },
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Local Identity'), h('div', { className: 'cv cv-sm mono' }, aws.local?.account)),
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Cross-Account'), h('div', { className: `cv ${ca?.failed?.length > 0 ? 'tr' : 'tg'}` }, `${ca?.ok}/${ca?.total}`))
  );
  if (!ca?.failed?.length) return cards;
  return h('div', null, cards, h('div', { className: 'cs' },
    h('strong', null, 'Failed: '), h('ul', null, ...ca.failed.map(f => h('li', { className: 'tr' }, `${f.account}: ${f.error}`)))
  ));
}

function dsCard(name, d) {
  if (!d) return null;
  const ok = d.token_ok === true || (d.configured === true && !d.error);
  const configured = d.configured !== false;
  return h('div', { className: 'card' },
    h('div', { className: 'cl' }, name),
    !configured ? badge(false, 'unconfigured') : d.error ? badge(false, 'error') : badge(ok, ok ? 'ok' : `${d.status}`),
    d.expires_in ? h('div', { className: 'cs' }, `expires in ${Math.round(d.expires_in / 60)}m`) : null
  );
}

function actionBadgeClass(action) {
  if (action === 'QUEUE') return 'ab-queue';
  if (action === 'AUTO') return 'ab-auto';
  if (action === 'NOTIFY') return 'ab-notify';
  return 'ab-other';
}

function ageLabel(classifiedAt) {
  if (!classifiedAt) return '—';
  const secs = Math.floor(Date.now() / 1000) - classifiedAt;
  if (secs < 3600) return `${Math.round(secs/60)}m`;
  if (secs < 86400) return `${Math.round(secs/3600)}h`;
  return `${Math.round(secs/86400)}d`;
}

// ── Tab rendering ──

function renderStatusTab(nodes) {
  const d = state.data;

  // Controls
  nodes.push(h('div', { className: 'ctrl' },
    h('div', { className: 'modes' },
      ...['quick', 'full', 'datasources'].map(m =>
        h('button', { className: `btn ${state.mode === m ? 'on' : ''}`, onclick: () => setMode(m), disabled: state.loading ? 'disabled' : null }, m)
      )
    ),
    h('button', { className: `btn ${state.auto ? 'on' : ''}`, onclick: toggleAuto }, state.auto ? '\u23f8 Auto' : '\u25b6 Auto'),
    h('button', { className: 'btn', onclick: () => runCheck(), disabled: state.loading ? 'disabled' : null }, state.loading ? '\u21bb ...' : '\u21bb Refresh')
  ));

  if (state.error) nodes.push(h('div', { className: 'err' }, state.error));

  if (d) {
    nodes.push(h('div', { className: 'meta' },
      h('span', null, `Checked: ${new Date(d.checked_at).toLocaleString()}`),
      h('span', null, `${d.duration_ms}ms`),
      h('span', null, `Mode: ${d.mode}`)
    ));
    nodes.push(renderGotchas(d.gotchas));

    if (d.box) {
      nodes.push(section('disk', 'Disk', renderDisk(d.box.disk)));
      nodes.push(section('cache', 'Cache', renderCache(d.box.cache)));
      nodes.push(section('windmill', 'Windmill', renderWindmill(d.box.windmill)));
      nodes.push(section('schedules', 'Schedules', renderSchedules(d.box.schedules)));
      nodes.push(section('infra', 'Infrastructure', renderInfra(d.box)));
    }
    if (d.datasources) {
      nodes.push(section('aws', 'AWS', renderAws(d.datasources.aws)));
      nodes.push(section('ds', 'Data Sources', h('div', { className: 'cg' },
        dsCard('Azure AD', d.datasources.azure_ad),
        dsCard('SDP', d.datasources.sdp),
        dsCard('Site24x7', d.datasources.site24x7),
        dsCard('Securonix', d.datasources.securonix),
        dsCard('Okta', d.datasources.okta)
      )));
    }
  } else if (!state.loading && !state.error) {
    nodes.push(h('div', { className: 'empty' }, 'Loading status...'));
  }
}

function renderTriageTab(nodes) {
  const sel = state.triageSelected;
  const selCount = sel.size;
  const allChecked = state.triageItems.length > 0 && state.triageItems.every(i => sel.has(i.id));

  // Toolbar: filter buttons + refresh
  nodes.push(h('div', { className: 'triage-toolbar' },
    h('div', { className: 'modes' },
      ...['all', 'QUEUE', 'AUTO', 'NOTIFY'].map(f =>
        h('button', { className: `btn ${state.triageFilter === f ? 'on' : ''}`, onclick: () => setTriageFilter(f) }, f === 'all' ? 'All' : f)
      )
    ),
    h('span', { className: 'td' }, state.triageTotal > 0 ? `${state.triageTotal} items` : ''),
    h('button', { className: 'btn', onclick: loadTriage, disabled: state.triageLoading ? 'disabled' : null },
      state.triageLoading ? '\u21bb ...' : '\u21bb Refresh')
  ));

  // Bulk action bar (visible when items selected)
  if (selCount > 0) {
    nodes.push(h('div', { className: 'bulk-bar' },
      h('span', { className: 'count' }, `${selCount} selected`),
      h('button', { className: 'btn', onclick: () => bulkAction('dismiss'), disabled: state.triageBulking ? 'disabled' : null }, 'Dismiss'),
      h('button', { className: 'btn', onclick: () => bulkAction('escalate'), disabled: state.triageBulking ? 'disabled' : null }, 'Escalate'),
      h('button', { className: 'btn', onclick: () => bulkAction('investigate'), disabled: state.triageBulking ? 'disabled' : null }, 'Investigate'),
      h('button', { className: 'btn', onclick: () => bulkAction('ticket'), disabled: state.triageBulking ? 'disabled' : null }, 'Create Ticket'),
      state.triageBulking ? h('span', { className: 'td' }, 'Working...') : null
    ));
  }

  if (state.triageError) nodes.push(h('div', { className: 'err' }, state.triageError));

  if (state.triageItems.length === 0 && !state.triageLoading) {
    nodes.push(h('div', { className: 'empty' }, 'No unread triage items'));
    return;
  }

  const tbl = h('div', { className: 'sec' },
    h('div', { className: 'sec-b' },
      h('table', { className: 'triage-table' },
        h('thead', null, h('tr', null,
          h('th', null, h('input', { type: 'checkbox', checked: allChecked ? 'checked' : null, onchange: e => toggleSelectAll(e.target.checked) })),
          h('th', null, 'Source'),
          h('th', null, 'Subject'),
          h('th', null, 'Sender'),
          h('th', null, 'Action'),
          h('th', null, 'Urgency'),
          h('th', null, 'Age'),
        )),
        h('tbody', null, ...state.triageItems.map(item =>
          h('tr', null,
            h('td', null, h('input', { type: 'checkbox', checked: sel.has(item.id) ? 'checked' : null, onchange: e => toggleSelectItem(item.id, e.target.checked) })),
            h('td', { className: 'td' }, item.source || '—'),
            h('td', null, item.subject || '(no subject)'),
            h('td', { className: 'td' }, item.sender || '—'),
            h('td', null, h('span', { className: `action-badge ${actionBadgeClass(item.action)}` }, item.action)),
            h('td', { className: `urg-${item.urgency}` }, item.urgency),
            h('td', { className: 'td' }, ageLabel(item.classified_at)),
          )
        ))
      )
    )
  );
  nodes.push(tbl);
}

// ── Sessions tab logic ──
async function loadSessions() {
  state.sessionsLoading = true; render();
  try {
    const resp = await fetch('/sessions?limit=30');
    const data = await resp.json();
    state.sessions = data.sessions || [];
  } catch (e) { state.sessions = []; }
  state.sessionsLoading = false; render();
}

function renderSessionsTab(nodes) {
  nodes.push(h('div', { className: 'ctrl' },
    h('button', { className: 'btn', onclick: loadSessions, disabled: state.sessionsLoading ? 'disabled' : null },
      state.sessionsLoading ? '\u21bb ...' : '\u21bb Refresh')
  ));
  if (state.sessions.length === 0) {
    nodes.push(h('div', { className: 'empty' }, state.sessionsLoading ? 'Loading...' : 'No sessions found'));
    return;
  }
  nodes.push(h('div', { className: 'sec' }, h('div', { className: 'sec-b' },
    h('table', null,
      h('thead', null, h('tr', null, h('th', null, 'Date'), h('th', null, 'Title'), h('th', null, 'Phase'), h('th', null, 'Effort'))),
      h('tbody', null, ...state.sessions.map(s =>
        h('tr', null,
          h('td', { className: 'td' }, s.date),
          h('td', null, s.title),
          h('td', null, h('span', { className: `badge ${s.phase === 'complete' ? 'b-ok' : 'b-fail'}` }, s.phase)),
          h('td', { className: 'td' }, s.effort)
        )
      ))
    )
  )));
}

// ── MCP Calls tab logic ──
async function loadMcpCalls() {
  state.mcpLoading = true; render();
  try {
    const resp = await fetch('/mcp-calls?limit=100');
    const data = await resp.json();
    state.mcpCalls = data.calls || [];
    state.mcpTotal = data.total || 0;
  } catch (e) { state.mcpCalls = []; }
  state.mcpLoading = false; render();
}

function renderMcpTab(nodes) {
  nodes.push(h('div', { className: 'ctrl' },
    h('span', { className: 'td' }, state.mcpTotal > 0 ? `${state.mcpTotal} total calls` : ''),
    h('button', { className: 'btn', onclick: loadMcpCalls, disabled: state.mcpLoading ? 'disabled' : null },
      state.mcpLoading ? '\u21bb ...' : '\u21bb Refresh')
  ));
  if (state.mcpCalls.length === 0) {
    nodes.push(h('div', { className: 'empty' }, state.mcpLoading ? 'Loading...' : 'No MCP calls recorded'));
    return;
  }
  nodes.push(h('div', { className: 'sec' }, h('div', { className: 'sec-b' },
    h('table', null,
      h('thead', null, h('tr', null, h('th', null, 'Time'), h('th', null, 'Tool'), h('th', null, 'Direction'), h('th', null, 'Session'))),
      h('tbody', null, ...state.mcpCalls.slice(0, 50).map(c =>
        h('tr', null,
          h('td', { className: 'td' }, c.timestamp ? new Date(c.timestamp).toLocaleString() : '\u2014'),
          h('td', { className: 'mono' }, (c.tool_name || '').replace('mcp__', '')),
          h('td', null, h('span', { className: `badge ${c.direction === 'pre' ? 'b-ok' : 'b-fail'}` }, c.direction || '?')),
          h('td', { className: 'td mono' }, (c.session_id || '').slice(0, 8))
        )
      ))
    )
  )));
}

// ── AI Activity tab logic ──
async function loadAiActivity() {
  state.aiLoading = true; render();
  try {
    const resp = await fetch('/ai-activity?hours=24');
    state.aiActivity = await resp.json();
  } catch (e) { state.aiActivity = null; }
  state.aiLoading = false; render();
}

function renderAiTab(nodes) {
  nodes.push(h('div', { className: 'ctrl' },
    h('button', { className: 'btn', onclick: loadAiActivity, disabled: state.aiLoading ? 'disabled' : null },
      state.aiLoading ? '\u21bb ...' : '\u21bb Refresh')
  ));

  const a = state.aiActivity;
  if (!a) {
    nodes.push(h('div', { className: 'empty' }, state.aiLoading ? 'Loading...' : 'Click refresh to load'));
    return;
  }

  // Postgres stats cards
  if (a.postgres) {
    nodes.push(section('pg', 'Postgres (PAI Knowledge Store)', h('div', { className: 'cg' },
      h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Memory Objects'), h('div', { className: 'cv' }, `${a.postgres.total_objects}`)),
      h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Embeddings'), h('div', { className: 'cv' }, `${a.postgres.total_embeddings}`)),
      h('div', { className: 'card' }, h('div', { className: 'cl' }, 'JSONL Lines'), h('div', { className: 'cv' }, `${a.postgres.total_lines}`)),
      h('div', { className: 'card' }, h('div', { className: 'cl' }, 'PAI Components'), h('div', { className: 'cv' }, `${a.postgres.pai_components}`)),
      h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Palant\u00edr Calls'), h('div', { className: 'cv' }, `${a.postgres.palantir_calls}`)),
    )));
  }

  // MCP calls by tool
  const mcpTools = Object.entries(a.mcp_calls_by_tool || {}).sort((a, b) => (b[1] as number) - (a[1] as number));
  if (mcpTools.length > 0) {
    nodes.push(section('mcp-summary', `MCP Calls (last ${a.period_hours}h)`,
      h('table', null,
        h('thead', null, h('tr', null, h('th', null, 'Tool'), h('th', null, 'Calls'))),
        h('tbody', null, ...mcpTools.map(([tool, count]) =>
          h('tr', null, h('td', { className: 'mono' }, tool.replace('mcp__', '')), h('td', null, `${count}`))
        ))
      )
    ));
  }

  // Recent Windmill jobs
  if (a.windmill_jobs?.length) {
    nodes.push(section('wm-jobs', 'Recent Windmill Jobs',
      h('table', null,
        h('thead', null, h('tr', null, h('th', null, 'Script'), h('th', null, 'Time'), h('th', null, 'Duration'), h('th', null, 'Status'))),
        h('tbody', null, ...a.windmill_jobs.map(j =>
          h('tr', null,
            h('td', { className: 'mono' }, (j.script || '').replace('f/', '')),
            h('td', { className: 'td' }, j.started ? new Date(j.started).toLocaleString() : '\u2014'),
            h('td', { className: 'td' }, j.duration_ms != null ? `${j.duration_ms}ms` : '\u2014'),
            h('td', null, badge(j.success, j.success ? 'ok' : 'fail'))
          )
        ))
      )
    ));
  }
}

// ── Integrations tab logic ──
async function loadIntegrations() {
  state.integrationsLoading = true; render();
  try {
    const q = state.intDomain ? `?domain=${state.intDomain}` : '';
    const resp = await fetch(`/integrations${q}`);
    state.integrations = await resp.json();
  } catch (e) { state.integrations = null; }
  state.integrationsLoading = false; render();
}

function setIntDomain(d) { state.intDomain = d; loadIntegrations(); }

function statusBadge(s) {
  if (s === 'active') return h('span', { className: 'badge b-ok' }, '\u2713 active');
  if (s === 'configured') return h('span', { className: 'badge', style: 'background:rgba(59,130,246,.15);color:var(--blue)' }, '\u25cb configured');
  if (s === 'placeholder') return h('span', { className: 'badge', style: 'background:rgba(107,114,128,.15);color:var(--dim)' }, '\u25cb placeholder');
  return h('span', { className: 'badge b-fail' }, s);
}

function renderIntegrationsTab(nodes) {
  nodes.push(h('div', { className: 'ctrl' },
    h('div', { className: 'modes' },
      ...['', 'work', 'personal', 'shared', 'infra'].map(d =>
        h('button', { className: `btn ${state.intDomain === d ? 'on' : ''}`, onclick: () => setIntDomain(d) }, d || 'All')
      )
    ),
    h('button', { className: 'btn', onclick: loadIntegrations, disabled: state.integrationsLoading ? 'disabled' : null },
      state.integrationsLoading ? '\u21bb ...' : '\u21bb Refresh')
  ));

  const data = state.integrations;
  if (!data || !data.integrations) {
    nodes.push(h('div', { className: 'empty' }, state.integrationsLoading ? 'Loading...' : 'Click refresh to load'));
    return;
  }

  // Summary cards
  const s = data.summary;
  nodes.push(h('div', { className: 'cg', style: 'margin-bottom:12px' },
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Total'), h('div', { className: 'cv' }, `${s.total}`)),
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Active'), h('div', { className: 'cv tg' }, `${s.active}`)),
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Configured'), h('div', { className: 'cv', style: 'color:var(--blue)' }, `${s.configured}`)),
    h('div', { className: 'card' }, h('div', { className: 'cl' }, 'Placeholder'), h('div', { className: 'cv td' }, `${s.placeholder}`)),
  ));

  // Table
  nodes.push(h('div', { className: 'sec' }, h('div', { className: 'sec-b' },
    h('table', null,
      h('thead', null, h('tr', null, h('th', null, 'Integration'), h('th', null, 'Domain'), h('th', null, 'Auth'), h('th', null, 'Status'), h('th', null, 'Notes'))),
      h('tbody', null, ...data.integrations.map(i =>
        h('tr', null,
          h('td', null, i.name),
          h('td', null, h('span', { className: `action-badge ab-${i.domain === 'work' ? 'queue' : i.domain === 'shared' ? 'notify' : 'other'}` }, i.domain)),
          h('td', { className: 'mono td' }, i.auth_type),
          h('td', null, statusBadge(i.status)),
          h('td', { className: 'td', style: 'max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap' }, i.notes || '\u2014'),
        )
      ))
    )
  )));
}

// ── Main render ──

function render() {
  const app = document.getElementById('app');
  const nodes = [];

  // Header
  nodes.push(h('header', null,
    h('h1', null, 'Imladris'),
  ));

  // Tab nav
  nodes.push(h('div', { className: 'tabs' },
    h('button', { className: `tab ${state.tab === 'status' ? 'active' : ''}`, onclick: () => { state.tab = 'status'; render(); } }, 'Status'),
    h('button', { className: `tab ${state.tab === 'triage' ? 'active' : ''}`, onclick: () => { if (state.tab !== 'triage') { state.tab = 'triage'; loadTriage(); } else render(); } }, 'Triage'),
    h('button', { className: `tab ${state.tab === 'sessions' ? 'active' : ''}`, onclick: () => { if (state.tab !== 'sessions') { state.tab = 'sessions'; loadSessions(); } else render(); } }, 'Sessions'),
    h('button', { className: `tab ${state.tab === 'mcp' ? 'active' : ''}`, onclick: () => { if (state.tab !== 'mcp') { state.tab = 'mcp'; loadMcpCalls(); } else render(); } }, 'MCP Calls'),
    h('button', { className: `tab ${state.tab === 'ai' ? 'active' : ''}`, onclick: () => { if (state.tab !== 'ai') { state.tab = 'ai'; loadAiActivity(); } else render(); } }, 'AI Activity'),
    h('button', { className: `tab ${state.tab === 'integrations' ? 'active' : ''}`, onclick: () => { if (state.tab !== 'integrations') { state.tab = 'integrations'; loadIntegrations(); } else render(); } }, 'Integrations'),
  ));

  if (state.tab === 'status') renderStatusTab(nodes);
  else if (state.tab === 'triage') renderTriageTab(nodes);
  else if (state.tab === 'sessions') renderSessionsTab(nodes);
  else if (state.tab === 'mcp') renderMcpTab(nodes);
  else if (state.tab === 'ai') renderAiTab(nodes);
  else if (state.tab === 'integrations') renderIntegrationsTab(nodes);

  app.replaceChildren(...nodes.filter(Boolean));
}

render();
runCheck();
</script>
</body>
</html>
