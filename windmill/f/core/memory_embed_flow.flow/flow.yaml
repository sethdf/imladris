summary: PAI Memory Embed — Nightly Backfill
description: 'Embeds new and updated memory objects into memory_vectors using
  pgml.embed() (intfloat/e5-small-v2, 384 dims, in-DB inference). Step 1 queries
  the delta (unembedded or stale). Step 2 runs N parallel workers, each holding
  a persistent PG connection so the model loads once per worker (~6s) then
  processes all its objects at ~100ms/call. Typical nightly delta: seconds.
  Initial backfill (~10,859 objects): ~5 min.'
value:
  modules:
    - id: planner
      summary: Query unembedded/stale objects, split into worker batches
      value:
        type: script
        input_transforms:
          dry_run:
            type: javascript
            expr: flow_input.dry_run
          num_workers:
            type: javascript
            expr: flow_input.num_workers
        path: f/core/memory_embed_planner
    - id: embed_workers
      summary: Embed batches in parallel (one persistent connection per worker)
      value:
        type: forloopflow
        modules:
          - id: worker
            summary: Embed one batch
            value:
              type: script
              input_transforms:
                batch_index:
                  type: javascript
                  expr: flow_input.iter.index
                dry_run:
                  type: javascript
                  expr: results.planner.dry_run
                keys:
                  type: javascript
                  expr: flow_input.iter.value
              path: f/core/memory_embed_worker
        iterator:
          type: javascript
          expr: results.planner.batches
        parallel: true
        parallelism:
          type: static
          value: 4
        skip_failures: true
    - id: summary
      summary: Aggregate results and log
      value:
        type: rawscript
        content: '!inline aggregate_results_and_log.inline_script.ts'
        input_transforms:
          dry_run:
            type: javascript
            expr: results.planner.dry_run
          total_planned:
            type: javascript
            expr: results.planner.total
          worker_results:
            type: javascript
            expr: results.embed_workers
        lock: '!inline aggregate_results_and_log.inline_script.lock'
        language: bun
  failure_module:
    id: failure
    summary: Log embed flow failure
    value:
      type: rawscript
      content: |
        export async function main(error_message: string, failed_step: string) {
          console.error(`memory_embed_flow FAILED at step: ${failed_step}`);
          console.error(`Error: ${error_message}`);
          return { failed: true, step: failed_step, error: error_message };
        }
      input_transforms:
        error_message:
          type: javascript
          expr: error.message || 'Unknown error'
        failed_step:
          type: javascript
          expr: error.step_id || 'unknown'
      lock: |-
        {
          "dependencies": {}
        }
        //bun.lock
        <empty>
      language: bun
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    dry_run:
      type: boolean
      description: Plan only — do not call pgml.embed()
      default: false
    num_workers:
      type: number
      description: Number of parallel embed workers (1-8)
      default: 4
  required: []
