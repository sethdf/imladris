summary: Triage Pipeline Orchestrator
description: Central coordinator for the triage pipeline. Classifies incoming
  items (email, ticket, alert) via Bedrock Sonnet, then investigates
  QUEUE/NOTIFY items via Steampipe probes, and proposes fixes for human
  approval. AUTO items are cached and returned immediately. All investigation is
  read-only.
lock: '!inline f/core/triage_pipeline.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    content:
      type: string
      description: The alert/email/ticket text to triage and investigate
    event_type:
      type: string
      description: 'Event type: alert, ticket, email, webhook'
      default: alert
    item_id:
      type: string
      description: Optional item ID for tracking across pipeline stages
      default: ''
    source:
      type: string
      description: 'Source system: m365, sdp, slack, github, aws'
      default: m365
  required:
    - content
