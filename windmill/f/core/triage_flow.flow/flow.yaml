summary: Triage-to-Remediation Flow
description: 'End-to-end DevOps triage pipeline: classifies an incoming event,
  investigates it, proposes a fix, gates on human approval, executes
  remediation, verifies the fix, and closes the ticket if successful.'
value:
  modules:
    - id: triage_pipeline
      summary: Classify, investigate, and propose fix
      value:
        type: script
        input_transforms:
          content:
            type: javascript
            expr: flow_input.content
          event_type:
            type: javascript
            expr: flow_input.event_type
          item_id:
            type: javascript
            expr: flow_input.item_id
          source:
            type: javascript
            expr: flow_input.source
        path: f/core/triage_pipeline
    - id: check_fixable
      summary: Branch on pipeline_status
      value:
        type: branchone
        branches:
          - summary: Fix proposed — proceed to approval
            modules:
              - id: request_approval
                summary: Request human approval for proposed action
                value:
                  type: script
                  input_transforms:
                    operation:
                      type: javascript
                      expr: results.triage_pipeline.proposed_action.action
                    requested_by:
                      type: static
                      value: triage_flow
                    resource:
                      type: javascript
                      expr: results.triage_pipeline.investigation.entities[0].value
                    severity:
                      type: javascript
                      expr: results.triage_pipeline.investigation.severity || "high"
                  path: f/core/approval_flow
              - id: approval_gate
                summary: Pause for human approval in Windmill UI
                value:
                  type: rawscript
                  content: '!inline pause_for_human_approval_in_windmill_ui.inline_script.ts'
                  input_transforms:
                    approval_id:
                      type: javascript
                      expr: results.request_approval.approval_id
                    operation:
                      type: javascript
                      expr: results.request_approval.operation
                    resource:
                      type: javascript
                      expr: results.request_approval.resource
                    severity:
                      type: javascript
                      expr: results.request_approval.severity
                  lock: '!inline pause_for_human_approval_in_windmill_ui.inline_script.lock'
                  language: bun
                suspend:
                  required_events: 1
                  self_approval_disabled: false
                  timeout: 86400
              - id: execute_remediation
                summary: Run the response playbook (approved)
                value:
                  type: script
                  input_transforms:
                    approval_id:
                      type: javascript
                      expr: results.request_approval.approval_id
                    dry_run:
                      type: static
                      value: false
                    params:
                      type: javascript
                      expr: JSON.stringify(results.triage_pipeline.proposed_action.params || {})
                    playbook:
                      type: javascript
                      expr: results.triage_pipeline.proposed_action.action
                    resource:
                      type: javascript
                      expr: results.triage_pipeline.investigation.entities[0].value
                  path: f/core/response_playbook
              - id: verify_fix
                summary: Verify remediation succeeded
                value:
                  type: script
                  input_transforms:
                    approval_id:
                      type: javascript
                      expr: results.request_approval.approval_id
                    item_id:
                      type: javascript
                      expr: flow_input.item_id
                    original_investigation:
                      type: javascript
                      expr: results.triage_pipeline.investigation
                    playbook_result:
                      type: javascript
                      expr: results.execute_remediation
                  path: f/core/verify_remediation
              - id: close_if_verified
                summary: Close ticket if fix is verified
                value:
                  type: branchone
                  branches:
                    - summary: Verified and has ticket — close it
                      modules:
                        - id: close_ticket
                          summary: Close the originating ticket
                          value:
                            type: script
                            input_transforms:
                              resolution:
                                type: javascript
                                expr: '`Auto-remediated: ${results.execute_remediation.playbook} on
                                  ${results.execute_remediation.resource}.
                                  Verified at ${results.verify_fix.verified_at
                                  || new Date().toISOString()}.`'
                              status:
                                type: static
                                value: Resolved
                              ticket_id:
                                type: javascript
                                expr: flow_input.item_id
                            path: f/domains/work/actions/close_ticket
                      expr: results.verify_fix.verified === true && flow_input.item_id &&
                        flow_input.item_id !== ''
                      parallel: true
                      skip_failure: true
                  default:
                    - id: log_verified_no_close
                      summary: Log verification result (no ticket to close)
                      value:
                        type: rawscript
                        content: '!inline log_verification_result_(no_ticket_to_close).inline_script.ts'
                        input_transforms:
                          item_id:
                            type: javascript
                            expr: flow_input.item_id
                          verification_detail:
                            type: javascript
                            expr: JSON.stringify(results.verify_fix)
                          verified:
                            type: javascript
                            expr: results.verify_fix.verified || false
                        lock: '!inline log_verification_result_(no_ticket_to_close).inline_script.lock'
                        language: bun
            expr: results.triage_pipeline.pipeline_status === 'fix_proposed'
            parallel: true
            skip_failure: true
        default:
          - id: log_result
            summary: Log triage result (no fix proposed)
            value:
              type: rawscript
              content: '!inline log_triage_result_(no_fix_proposed).inline_script.ts'
              input_transforms:
                summary:
                  type: javascript
                  expr: results.triage_pipeline.summary || results.triage_pipeline.triage?.summary
                    || 'No summary'
                item_id:
                  type: javascript
                  expr: flow_input.item_id
                pipeline_status:
                  type: javascript
                  expr: results.triage_pipeline.pipeline_status || 'unknown'
                source:
                  type: javascript
                  expr: flow_input.source
              lock: '!inline log_triage_result_(no_fix_proposed).inline_script.lock'
              language: bun
  failure_module:
    id: failure
    summary: Handle flow failure
    value:
      type: rawscript
      content: >
        export async function main(error_message: string, failed_step: string,
        source: string, item_id: string) {
          console.error(`Triage flow FAILED at step: ${failed_step}`);
          console.error(`Error: ${error_message}`);
          console.error(`Source: ${source}, Item: ${item_id}`);

          // Attempt voice notification on failure
          try {
            await fetch("http://localhost:8888/notify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                message: `Triage flow failed at ${failed_step}. ${error_message}`,
                title: "Triage Flow Failure",
              }),
            });
          } catch {
            // Voice server unavailable — non-fatal
          }

          return {
            failed: true,
            step: failed_step,
            error: error_message,
            source,
            item_id,
            timestamp: new Date().toISOString(),
          };
        }
      input_transforms:
        error_message:
          type: javascript
          expr: error.message || 'Unknown error'
        failed_step:
          type: javascript
          expr: error.step_id || 'unknown'
        item_id:
          type: javascript
          expr: flow_input.item_id
        source:
          type: javascript
          expr: flow_input.source
      lock: |-
        {
          "dependencies": {}
        }
        //bun.lock
        <empty>
      language: bun
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    content:
      type: string
      description: Raw event content / alert body
    event_type:
      type: string
      description: Type of event (e.g. alert, incident, change)
      default: alert
    item_id:
      type: string
      description: Source ticket or alert ID (used for closing)
      default: ''
    source:
      type: string
      description: Event source (e.g. m365, sdp, aws, github)
      default: m365
  required:
    - content
