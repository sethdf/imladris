summary: Process Actionable Triage Items
description: >-
  Post-triage orchestrator: reads unprocessed QUEUE/NOTIFY items from
  triage_results, creates SDP Tasks, optionally runs investigation pipeline,
  attaches findings as task notes. Only work-domain items flow to SDP.
  Deduplicates by hash — one task per unique item.
lock: []
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    max_items:
      type: number
      default: 20
      description: Maximum items to process per run (investigation ~30s/item)
    priority_filter:
      type: string
      default: ""
      description: "Filter by action: NOTIFY or QUEUE (empty = both)"
    skip_investigation:
      type: boolean
      default: false
      description: Create tasks without running investigation pipeline
    dry_run:
      type: boolean
      default: false
      description: Preview which items would get tasks without creating them
    delay_ms:
      type: number
      default: 3000
      description: Milliseconds between processing items (rate limiting)
  required: []
is_template: false
kind: script
language: bun
