summary: Process Actionable Triage Items
description: >-
  Investigate-first pipeline: Phase 1 runs investigations on uninvestigated +
  retry-eligible items, Phase 2 creates SDP Tasks only for substantial findings,
  Phase 3 escalates stale items that exhausted retries. Nothing is ever lost —
  items either get tasks with findings or escalation tasks explaining gaps.
  Only work-domain items flow to SDP. Deduplicates by hash.
lock: []
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    max_items:
      type: number
      default: 20
      description: Maximum items to process per run (investigation ~30s/item)
    priority_filter:
      type: string
      default: ""
      description: "Filter by action: NOTIFY or QUEUE (empty = both)"
    skip_investigation:
      type: boolean
      default: false
      description: Create tasks without running investigation pipeline
    dry_run:
      type: boolean
      default: false
      description: Preview which items would get tasks without creating them
    delay_ms:
      type: number
      default: 3000
      description: Milliseconds between processing items (rate limiting)
    retry_interval_hours:
      type: number
      default: 6
      description: Hours between retry attempts for waiting_context items
    max_retry_attempts:
      type: number
      default: 5
      description: Max investigation attempts before escalating to task
  required: []
is_template: false
kind: script
language: bun
