summary: 'Triage bulk update — investigate or create tickets for selected items'
description: 'Triggers investigation pipeline or SDP ticket creation for bulk-selected triage items from the status dashboard GUI'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    ids:
      type: array
      items:
        type: integer
      description: Triage item IDs to process
    bulk_action:
      type: string
      enum: [investigate, ticket]
      description: Action to perform
    notes:
      type: string
      description: Optional notes to attach
  required: [ids, bulk_action]
