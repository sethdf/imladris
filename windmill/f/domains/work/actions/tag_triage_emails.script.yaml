summary: Tag Triage Emails with Outlook Categories
description: 'Tags investigated emails with Outlook categories for easy
  filtering. Adds "Triage: {urgency}" and "Finding: {root_cause}" categories.
  Only modifies categories — never touches email content.'
lock: '!inline f/domains/work/actions/tag_triage_emails.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    clear_tags:
      type: boolean
      description: Remove all triage categories from matching emails
      default: false
    dry_run:
      type: boolean
      description: Preview tags without applying them
      default: true
    status_filter:
      type: string
      description: 'Investigation status to tag: substantial, waiting_context'
      default: substantial
  required: []
tag: nativets
