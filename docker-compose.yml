# Imladris v2 — Windmill + supporting services
# Decision 18: Windmill self-hosted on EC2, Docker Compose
# Decision 33: Tailscale-only network — all ports bind to 127.0.0.1 ONLY
#
# IMPORTANT: Docker data-root is on NVMe instance store (/local/docker) for performance.
# Postgres data uses a bind mount to EBS (/home/ec2-user/.windmill/postgres) for persistence.
# All other Docker data (images, containers) is ephemeral and re-pulled after stop/start.
#
# Deploy: docker compose up -d                          (core stack only)
# Deploy: docker compose --profile dashboard up -d     (core + status dashboard)
# Docs:   https://www.windmill.dev/docs/advanced/self_host
#
# REQUIRED: Create a .env file with these variables:
#   WINDMILL_DB_PASSWORD=<generate-a-strong-password>
#   WINDMILL_ADMIN_SECRET=<generate-a-strong-secret>

# ── Shared worker config (DRY) ──────────────────────────────────────────────
x-worker: &worker-base
  image: ghcr.io/windmill-labs/windmill:latest
  restart: always
  entrypoint: ["/scripts/native-worker-entrypoint.sh"]
  command: ["windmill"]
  environment: &worker-env
    DATABASE_URL: postgres://postgres:${WINDMILL_DB_PASSWORD}@windmill_db/windmill
    MODE: worker
    WORKER_GROUP: default
    BASE_INTERNAL_URL: http://windmill_server:8000
    CACHE_DIR: /local/cache/triage
    HOME: /home/ec2-user
    NUM_WORKERS: "4"
  volumes: &worker-volumes
    - /local/cache:/local/cache
    - /usr/lib/nodejs20/lib/node_modules/@anthropic-ai:/usr/lib/node_modules/@anthropic-ai:ro
    - /home/ec2-user/.claude:/home/ec2-user/.claude:ro
    - /home/ec2-user/.claude.json:/home/ec2-user/.claude.json:ro
    - ./scripts/native-worker-entrypoint.sh:/scripts/native-worker-entrypoint.sh:ro
    - ./knowledge:/home/ec2-user/repos/imladris/knowledge:ro
    # Windmill<->PAI filesystem queue (Phase 1b: Docker-Modular)
    # Workers write job requests to inbox, read results from outbox
    - /pai/inbox:/pai/inbox
    - /pai/outbox:/pai/outbox:ro
  depends_on:
    windmill_db:
      condition: service_healthy

services:

  # ── Core: Windmill ─────────────────────────────────────────────────────────

  windmill_server:
    image: ghcr.io/windmill-labs/windmill:latest
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:${WINDMILL_DB_PASSWORD}@windmill_db/windmill
      - MODE=server
      - BASE_URL=http://127.0.0.1:8000
      - SUPERADMIN_SECRET=${WINDMILL_ADMIN_SECRET}
    depends_on:
      windmill_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  windmill_worker:
    <<: *worker-base

  windmill_worker_2:
    <<: *worker-base

  windmill_worker_3:
    <<: *worker-base

  windmill_worker_4:
    <<: *worker-base

  windmill_worker_native:
    <<: *worker-base
    environment:
      <<: *worker-env
      WORKER_GROUP: native
      # WORKER_TAGS routes scripts/jobs that declare `tag: native` (in script.yaml)
      # to this worker exclusively. memory-sync Phase 4a workflows tag themselves
      # `native` because they wrap PAI tools that need to WRITE to ~/.claude/.
      WORKER_TAGS: native
      NUM_WORKERS: "1"
    # Override the read-only ~/.claude mount from worker-volumes — this worker
    # is the only one that may write to PAI memory directories. All other
    # workers stay read-only as a safety boundary.
    volumes:
      - /local/cache:/local/cache
      - /usr/lib/nodejs20/lib/node_modules/@anthropic-ai:/usr/lib/node_modules/@anthropic-ai:ro
      - /home/ec2-user/.claude:/home/ec2-user/.claude:rw
      - /home/ec2-user/.claude.json:/home/ec2-user/.claude.json:ro
      - ./scripts/native-worker-entrypoint.sh:/scripts/native-worker-entrypoint.sh:ro
      - ./knowledge:/home/ec2-user/repos/imladris/knowledge:ro
      - /pai/inbox:/pai/inbox
      - /pai/outbox:/pai/outbox:ro

  windmill_db:
    image: imladris/postgres:pg16
    restart: always
    command: >
      postgres
        -c shared_preload_libraries=pgml,age,pg_cron
        -c cron.database_name=postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /home/ec2-user/.windmill/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=windmill
      - POSTGRES_PASSWORD=${WINDMILL_DB_PASSWORD}
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  windmill_lsp:
    image: ghcr.io/windmill-labs/windmill-lsp:latest
    restart: always
    ports:
      - "127.0.0.1:3001:3001"

  # ── LiteLLM Proxy — unified LLM gateway with full logging ───────────────
  # All LLM calls (Bedrock, OpenAI, Gemini) route through this proxy.
  # Captures full request/response for lossless conversation history.
  # Start with: docker compose --profile proxy up -d

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    profiles: [proxy]
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:${WINDMILL_DB_PASSWORD}@windmill_db:5432/pai
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-imladris-litellm}
      - AWS_REGION_NAME=us-east-1
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    depends_on:
      windmill_db:
        condition: service_healthy

  # ── Dashboard profile ──────────────────────────────────────────────────────
  # Start with: docker compose --profile dashboard up -d

  status-dashboard:
    image: oven/bun:latest
    restart: always
    profiles: [dashboard]
    working_dir: /app
    command: ["sh", "-c", "bun install --frozen-lockfile 2>/dev/null; bun server.ts"]
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - WINDMILL_URL=http://windmill_server:8000
      - POSTGRES_URL=postgresql://postgres:${WINDMILL_DB_PASSWORD}@windmill_db:5432/pai
      - HOME=/home/bun
    volumes:
      - ./status-dashboard:/app
    depends_on:
      windmill_server:
        condition: service_healthy
